<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality COE Project Flow</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f4f5f7;color:#172b4d;height:100vh;overflow:hidden}
:root{
  --sidebar:#1e2a3a;--sidebar-hover:#2c3e52;--sidebar-active:#3a506b;--sidebar-text:#b8c4d0;
  --accent:#0052cc;--accent-h:#0065ff;--accent-light:#deebff;
  --bg:#f4f5f7;--white:#fff;--border:#dfe1e6;
  --txt:#172b4d;--txt2:#6b778c;
  --todo:#dfe1e6;--prog:#deebff;--test:#fff0b3;--done:#e3fcef;
  --done-txt:#006644;--prog-txt:#0052cc;--test-txt:#974f0c;
  --r4:4px;--r6:6px;--shadow:0 1px 4px rgba(0,0,0,.15)
}

/* ===== AUTH ===== */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e2a3a 0%,#0052cc 100%)}
.auth-box{background:#fff;border-radius:12px;padding:40px;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:26px;color:#0052cc;font-weight:700}
.auth-logo p{color:#6b778c;font-size:13px;margin-top:4px}
.auth-tabs{display:flex;border-bottom:2px solid #dfe1e6;margin-bottom:24px}
.auth-tab{flex:1;text-align:center;padding:10px;cursor:pointer;color:#6b778c;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.auth-tab.active{color:#0052cc;border-bottom-color:#0052cc}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#172b4d;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:2px solid #dfe1e6;border-radius:4px;font-size:14px;color:#172b4d;transition:.2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#0052cc;outline:none}
.btn{padding:9px 18px;border-radius:4px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#0052cc;color:#fff}.btn-primary:hover{background:#0065ff}
.btn-secondary{background:#f4f5f7;color:#172b4d;border:1px solid #dfe1e6}.btn-secondary:hover{background:#ebecf0}
.btn-danger{background:#de350b;color:#fff}.btn-danger:hover{background:#ff5630}
.btn-ghost{background:transparent;color:#6b778c;border:none}.btn-ghost:hover{background:#f4f5f7;color:#172b4d}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.auth-error{background:#ffebe6;color:#de350b;padding:10px 12px;border-radius:4px;font-size:13px;margin-bottom:16px;display:none}

/* ===== APP LAYOUT ===== */
#app{display:flex;height:100vh;display:none}
#sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* ===== SIDEBAR ===== */
.sidebar-logo{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo span{color:#fff;font-size:17px;font-weight:700}
.sidebar-logo .logo-icon{width:32px;height:32px;background:#0052cc;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.sidebar-section{padding:16px 0 8px}
.sidebar-section-title{padding:0 20px 6px;font-size:11px;font-weight:600;color:#7a8fa0;text-transform:uppercase;letter-spacing:.6px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;color:var(--sidebar-text);font-size:13.5px;transition:.15s;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--sidebar-hover);color:#fff}
.sidebar-item.active{background:var(--sidebar-active);color:#fff;border-left-color:#0052cc}
.sidebar-item svg{flex-shrink:0;opacity:.7}
.sidebar-item.active svg,.sidebar-item:hover svg{opacity:1}
.project-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
.sidebar-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding:16px 20px}
.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}
.user-info:hover .user-name{color:#fff}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{color:var(--sidebar-text);font-size:13px;font-weight:500}
.user-role{color:#7a8fa0;font-size:11px}

/* ===== TOPBAR ===== */
.topbar-title{font-size:16px;font-weight:600;color:#172b4d;display:flex;align-items:center;gap:8px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.view-tabs{display:flex;gap:2px;background:#f4f5f7;border-radius:6px;padding:3px}
.view-tab{padding:5px 14px;border-radius:4px;cursor:pointer;font-size:13px;color:#6b778c;transition:.15s}
.view-tab.active{background:#fff;color:#172b4d;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.search-box{display:flex;align-items:center;gap:8px;background:#f4f5f7;border:1px solid #dfe1e6;border-radius:4px;padding:6px 12px}
.search-box input{border:none;background:transparent;font-size:13px;color:#172b4d;width:180px;outline:none}
.search-box input::placeholder{color:#6b778c}

/* ===== BOARDS ===== */
.board-wrap{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;min-height:calc(100vh - 140px)}
.board-col{min-width:280px;max-width:280px;background:#ebecf0;border-radius:8px;display:flex;flex-direction:column}
.board-col-header{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.board-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#5e6c84}
.board-col-count{background:#dfe1e6;color:#5e6c84;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.board-col-items{padding:0 8px 8px;flex:1;overflow-y:auto;min-height:60px}
.board-card{background:#fff;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:.15s;border-left:3px solid transparent}
.board-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15);transform:translateY(-1px)}
.board-card-key{font-size:11px;color:#6b778c;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.board-card-title{font-size:13.5px;color:#172b4d;line-height:1.4;margin-bottom:10px}
.board-card-footer{display:flex;align-items:center;justify-content:space-between}
.add-card-btn{width:100%;padding:8px;background:transparent;border:none;cursor:pointer;color:#6b778c;font-size:13px;text-align:left;border-radius:4px;margin:0 8px 8px;transition:.15s}
.add-card-btn:hover{background:#d4d8e0;color:#172b4d}

/* ===== LIST VIEW ===== */
.list-wrap{background:#fff;border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.list-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
table.list-table{width:100%;border-collapse:collapse;font-size:13px}
.list-table th{padding:10px 14px;background:#f4f5f7;color:#6b778c;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer}
.list-table th:hover{background:#ebecf0}
.list-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.list-table tr:hover td{background:#f8f9fa;cursor:pointer}
.list-table tr:last-child td{border-bottom:none}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.badge-todo{background:#dfe1e6;color:#42526e}
.badge-progress{background:#deebff;color:#0052cc}
.badge-testing{background:#fff0b3;color:#974f0c}
.badge-done{background:#e3fcef;color:#006644}
.badge-highest{background:#ffebe6;color:#de350b}
.badge-high{background:#fff0b3;color:#974f0c}
.badge-medium{background:#fffae6;color:#5e4a00}
.badge-low{background:#e3fcef;color:#006644}
.badge-lowest{background:#f4f5f7;color:#6b778c}
.type-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:700;color:#fff}
.type-task{background:#4c9aff}
.type-bug{background:#ff5630}
.type-feature{background:#36b37e}
.type-issue{background:#ff8b00}

/* ===== ITEM DETAIL PANEL ===== */
#item-panel{position:fixed;top:0;right:-700px;width:680px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:200;transition:.3s ease;display:flex;flex-direction:column}
#item-panel.open{right:0}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.panel-key{font-size:12px;color:#6b778c;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-footer{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.panel-section{margin-bottom:24px}
.panel-section-title{font-size:11px;font-weight:600;color:#6b778c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.panel-title-input{font-size:20px;font-weight:600;color:#172b4d;border:none;width:100%;outline:none;padding:4px 0;margin-bottom:8px;background:transparent}
.panel-title-input:hover{background:#f4f5f7;padding:4px 8px;border-radius:4px}
.panel-title-input:focus{background:#f4f5f7;padding:4px 8px;border-radius:4px}
.panel-desc{min-height:60px;border:1px solid transparent;border-radius:4px;padding:8px;font-size:14px;color:#172b4d;cursor:pointer;line-height:1.6;white-space:pre-wrap}
.panel-desc:hover{border-color:var(--border);background:#fafbfc}
.panel-desc.editing{border-color:#0052cc;background:#fff;cursor:text;outline:none}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:11px;color:#6b778c;font-weight:600}
.meta-value{font-size:13px;color:#172b4d}
.meta-select{border:1px solid transparent;border-radius:4px;padding:5px 8px;font-size:13px;color:#172b4d;cursor:pointer;background:transparent;width:100%}
.meta-select:hover{border-color:var(--border);background:#f4f5f7}
.meta-select:focus{border-color:#0052cc;outline:none;background:#fff}
.link-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f4f5f7;border-radius:4px;margin-bottom:6px;font-size:13px}
.link-type{font-size:11px;color:#6b778c;font-style:italic;min-width:90px}
.link-key{color:#0052cc;cursor:pointer;font-weight:500}
.link-key:hover{text-decoration:underline}
.comment-item{display:flex;gap:10px;margin-bottom:16px}
.comment-content{flex:1;background:#f4f5f7;border-radius:6px;padding:10px 12px}
.comment-author{font-size:12px;font-weight:600;color:#172b4d;margin-bottom:4px}
.comment-time{font-size:11px;color:#6b778c}
.comment-text{font-size:13.5px;color:#172b4d;line-height:1.5;white-space:pre-wrap}
.comment-input-wrap{display:flex;gap:10px;align-items:flex-start}
.comment-input-wrap textarea{flex:1;border:2px solid var(--border);border-radius:6px;padding:10px;font-size:13.5px;resize:vertical;min-height:60px;font-family:inherit;transition:.2s}
.comment-input-wrap textarea:focus{border-color:#0052cc;outline:none}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.5);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:8px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(9,30,66,.25)}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:18px;font-weight:600;color:#172b4d}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 20px;display:flex;justify-content:flex-end;gap:10px}
.close-btn{background:none;border:none;cursor:pointer;color:#6b778c;font-size:20px;line-height:1;padding:4px}
.close-btn:hover{color:#172b4d}
.panel-overlay{position:fixed;inset:0;background:rgba(9,30,66,.4);z-index:199;display:none}
.panel-overlay.open{display:block}

/* ===== HOME / DASHBOARD ===== */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:28px}
.project-card{background:#fff;border-radius:8px;padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;border-top:4px solid #0052cc}
.project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-2px)}
.project-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.project-card p{font-size:13px;color:#6b778c;margin-bottom:14px;line-height:1.4}
.project-stats{display:flex;gap:12px}
.stat{text-align:center;background:#f4f5f7;border-radius:6px;padding:8px 14px}
.stat-num{font-size:18px;font-weight:700;color:#172b4d}
.stat-lbl{font-size:10px;color:#6b778c;text-transform:uppercase}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-header h2{font-size:16px;font-weight:600}

/* ===== ADMIN ===== */
.members-table{width:100%;background:#fff;border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.members-table th,.members-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.members-table th{background:#f4f5f7;font-weight:600;font-size:11px;text-transform:uppercase;color:#6b778c}
.role-badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.role-admin{background:#deebff;color:#0052cc}
.role-member{background:#e3fcef;color:#006644}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:6px;font-size:13.5px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s ease;max-width:320px}
.toast-success{background:#36b37e;color:#fff}
.toast-error{background:#de350b;color:#fff}
.toast-info{background:#0052cc;color:#fff}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* ===== MISC ===== */
.empty-state{text-align:center;padding:48px 24px;color:#6b778c}
.empty-state svg{margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-highest{background:#de350b}.dot-high{background:#ff8b00}.dot-medium{background:#f59e0b}.dot-low{background:#36b37e}.dot-lowest{background:#6b778c}
.overlay-close{cursor:pointer}
.tag{display:inline-block;background:#deebff;color:#0052cc;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;margin:2px}
select option{color:#172b4d}
.color-swatch{display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:5px;vertical-align:middle}
.drag-over{background:#c8d4e0 !important}
.hint{font-size:11px;color:#6b778c;margin-top:4px}
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⚡ Quality COE Project Flow</h1>
      <p>專案管理系統</p>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">登入</div>
      <div class="auth-tab" onclick="switchAuthTab('register')">註冊</div>
    </div>
    <div id="login-form">
      <div class="form-group"><label>帳號</label><input type="text" id="login-name" placeholder="輸入帳號名稱"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="login()">登入</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group"><label>姓名</label><input type="text" id="reg-name" placeholder="你的名字"></div>
      <div class="form-group"><label>電子郵件</label><input type="email" id="reg-email" placeholder="your@email.com"></div>
      <div class="form-group"><label>密碼（至少 6 位）</label><input type="password" id="reg-password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="register()">建立帳號</button>
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">PF</div>
      <span>Quality COE</span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-item" onclick="showView('home')" id="nav-home">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        首頁
      </div>
      <div class="sidebar-item" onclick="showView('projects')" id="nav-projects">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        所有專案
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">我的專案</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div id="sidebar-admin" style="display:none">
      <div class="sidebar-item" onclick="showView('admin')" id="nav-admin">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        管理員面板
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-info" onclick="showUserMenu()">
        <div class="user-avatar" id="sidebar-avatar"></div>
        <div>
          <div class="user-name" id="sidebar-name">載入中…</div>
          <div class="user-role" id="sidebar-role"></div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%" onclick="logout()">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">首頁</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- ===== PANEL OVERLAY ===== -->
<div class="panel-overlay" id="panel-overlay" onclick="closeItemPanel()"></div>

<!-- ===== ITEM DETAIL PANEL ===== -->
<div id="item-panel">
  <div class="panel-header">
    <span class="panel-key" id="panel-key"></span>
    <div style="display:flex;gap:8px;margin-left:auto">
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentItem()">刪除</button>
      <button class="close-btn" onclick="closeItemPanel()">×</button>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- ===== CREATE / EDIT PROJECT MODAL ===== -->
<div class="modal-overlay" id="modal-project">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-project-title">建立專案</h3>
      <button class="close-btn" onclick="closeModal('modal-project')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="proj-edit-id">
      <div class="form-group"><label>專案名稱</label><input type="text" id="proj-name" placeholder="例：前端重構專案"></div>
      <div class="form-group"><label>專案代號（英文縮寫）</label><input type="text" id="proj-key" placeholder="例：FE" maxlength="6" style="text-transform:uppercase"></div>
      <div class="form-group"><label>說明</label><textarea id="proj-desc" rows="3" placeholder="專案描述…"></textarea></div>
      <div class="form-group">
        <label>顏色</label>
        <select id="proj-color">
          <option value="#0052cc">藍色</option>

<script>

// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyADoR2lK8d3VHgSUhZtuDfiy4_LMKxjvRE",
  authDomain: "project-flow-d25bb.firebaseapp.com",
  projectId: "project-flow-d25bb",
  storageBucket: "project-flow-d25bb.firebasestorage.app",
  messagingSenderId: "896109693580",
  appId: "1:896109693580:web:9969cfa2b55224f22e09a9",
  measurementId: "G-SW6ES3S3CJ"
};

// =============================================
// DEMO MODE — Firebase 未設定時自動使用 localStorage
// =============================================
const DEMO_MODE = firebaseConfig.apiKey === "YOUR_API_KEY";
let auth, db, FV;

if (DEMO_MODE) {
  console.log('%c⚡ Quality COE Project Flow — 本機 Demo 模式（資料儲存於 localStorage）', 'color:#0052cc;font-weight:bold;font-size:14px');

  // ---- FieldValue mock ----
  FV = {
    serverTimestamp: () => ({ _fv:'ts' }),
    arrayUnion: (...els) => ({ _fv:'union', _els:els }),
    arrayRemove: (...els) => ({ _fv:'remove', _els:els }),
  };

  // ---- LocalStore helpers ----
  const _ls = { _cbs:{} };
  function _getCol(n){ try{ return JSON.parse(localStorage.getItem('pf_'+n)||'{}'); }catch{ return {}; } }
  function _saveCol(n,d){ localStorage.setItem('pf_'+n,JSON.stringify(d)); (_ls._cbs[n]||[]).forEach(f=>f()); }
  function _uid(){ return '_'+Math.random().toString(36).slice(2)+Date.now().toString(36); }
  function _fvProc(data, ex={}){
    const r={};
    for(const [k,v] of Object.entries(data)){
      if(v&&v._fv==='ts')     r[k]={seconds:Math.floor(Date.now()/1000)};
      else if(v&&v._fv==='union')  r[k]=[...new Set([...(ex[k]||[]),...v._els])];
      else if(v&&v._fv==='remove') r[k]=(ex[k]||[]).filter(x=>!v._els.includes(x));
      else r[k]=v;
    }
    return r;
  }
  function _snap(docs){ return {docs:docs.map(([id,data])=>({id,exists:true,data:()=>data}))}; }
  function _query(n,ws,ord,lim){
    let docs=Object.entries(_getCol(n));
    for(const {f,op,v} of ws){
      docs=docs.filter(([,d])=>{
        const val=d[f];
        if(op==='==') return val===v;
        if(op==='array-contains') return Array.isArray(val)&&val.includes(v);
        return true;
      });
    }
    if(ord){ docs.sort(([,a],[,b])=>{let av=a[ord.f],bv=b[ord.f]; if(av?.seconds)av=av.seconds; if(bv?.seconds)bv=bv.seconds; return av<bv?(ord.d==='asc'?-1:1):av>bv?(ord.d==='asc'?1:-1):0;}); }
    if(lim) docs=docs.slice(0,lim);
    return docs;
  }

  function localCol(n,ws=[],ord=null,lim=null){
    return {
      where(f,op,v){ return localCol(n,[...ws,{f,op,v}],ord,lim); },
      orderBy(f,d='asc'){ return localCol(n,ws,{f,d},lim); },
      limit(x){ return localCol(n,ws,ord,x); },
      async get(){ return _snap(_query(n,ws,ord,lim)); },
      onSnapshot(cb){
        const notify=()=>cb(_snap(_query(n,ws,ord,lim)));
        notify();
        if(!_ls._cbs[n]) _ls._cbs[n]=[];
        _ls._cbs[n].push(notify);
        return ()=>{ _ls._cbs[n]=_ls._cbs[n].filter(f=>f!==notify); };
      },
      async add(data){ const id=_uid(); const c=_getCol(n); c[id]=_fvProc(data); _saveCol(n,c); return {id}; },
      doc(id){ return localDoc(n,id||_uid()); },
    };
  }

  function localDoc(n,id){
    return {
      _id:id,
      _getData(){ return _getCol(n)[id]||null; },
      async get(){ const d=this._getData(); return {id,exists:d!==null,data:()=>d||{}}; },
      async set(data){ const c=_getCol(n); c[id]=_fvProc(data); _saveCol(n,c); },
      async update(data){ const c=_getCol(n); const ex=c[id]||{}; c[id]={...ex,..._fvProc(data,ex)}; _saveCol(n,c); },
      _updateSync(data){ const c=_getCol(n); const ex=c[id]||{}; c[id]={...ex,..._fvProc(data,ex)}; _saveCol(n,c); },
      _setSync(data){ const c=_getCol(n); c[id]=_fvProc(data); _saveCol(n,c); },
      async delete(){ const c=_getCol(n); delete c[id]; _saveCol(n,c); },
    };
  }

  db = {
    collection:(n)=>localCol(n),
    runTransaction: async (fn)=>fn({
      get: async(ref)=>ref.get(),
      update:(ref,data)=>ref._updateSync(data),
      set:(ref,data)=>ref._setSync(data),
    }),
  };

  // ---- LocalAuth ----
  const _acbs=[];
  let _cu=null;
  try{ _cu=JSON.parse(localStorage.getItem('pf_auth')||'null'); }catch{}
  auth = {
    onAuthStateChanged(cb){ _acbs.push(cb); setTimeout(()=>cb(_cu),0); return ()=>{ _acbs.splice(_acbs.indexOf(cb),1); }; },
    async signInWithEmailAndPassword(email,pass){
      // 使用獨立 key pf_credentials，避免與 firestore users collection 衝突
      const creds=JSON.parse(localStorage.getItem('pf_credentials')||'{}');
      const found=Object.entries(creds).find(([,u])=>u.email===email&&u._pw===pass);
      if(!found) throw {code:'auth/user-not-found'};
      _cu={uid:found[0],email};
      localStorage.setItem('pf_auth',JSON.stringify(_cu));
      _acbs.forEach(cb=>cb(_cu));
    },
    async createUserWithEmailAndPassword(email,pass){
      const creds=JSON.parse(localStorage.getItem('pf_credentials')||'{}');
      if(Object.values(creds).find(u=>u.email===email)) throw {code:'auth/email-already-in-use'};
      const uid='u_'+Math.random().toString(36).slice(2);
      creds[uid]={email,_pw:pass};
      localStorage.setItem('pf_credentials',JSON.stringify(creds));
      _cu={uid,email};
      localStorage.setItem('pf_auth',JSON.stringify(_cu));
      // 延遲觸發，讓 register() 有時間先存完 profile doc
      setTimeout(()=>_acbs.forEach(cb=>cb(_cu)), 0);
      return {user:_cu};
    },
    async signOut(){
      _cu=null;
      localStorage.removeItem('pf_auth');
      _acbs.forEach(cb=>cb(null));
    },
  };

  // Demo mode banner
  window.addEventListener('DOMContentLoaded', ()=>{
    const banner = document.createElement('div');
    banner.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#0052cc;color:#fff;text-align:center;padding:6px;font-size:12px;z-index:9999';
    banner.innerHTML='⚡ <strong>Demo 模式</strong>　資料儲存於此瀏覽器的 localStorage，填入 Firebase 設定後正式上線';
    document.body.appendChild(banner);
  });

} else {
  // ---- Real Firebase ----
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db   = firebase.firestore();
  FV   = firebase.firestore.FieldValue;
}

// =============================================
// STATE
// =============================================
let S = {
  user: null,
  profile: null,
  projects: [],
  currentProject: null,
  projectView: 'board', // board | list
  items: [],
  allItems: [],       // for link search
  users: {},          // uid -> profile cache
  panelItem: null,    // item currently in side panel
  unsubs: [],         // firestore unsubscribers
  editingTitle: false,
  editingDesc: false,
};

// =============================================
// AUTH
// =============================================
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-error').style.display = 'none';
}

async function login() {
  const nameInput = document.getElementById('login-name').value.trim();
  const pass = document.getElementById('login-password').value;
  if (!nameInput || !pass) return showAuthError('請填寫帳號和密碼');
  try {
    let email;
    if (DEMO_MODE) {
      const col = JSON.parse(localStorage.getItem('pf_users') || '{}');
      const found = Object.entries(col).find(([, u]) => u.name === nameInput);
      if (!found) throw { code: 'auth/user-not-found' };
      const creds = JSON.parse(localStorage.getItem('pf_credentials') || '{}');
      const cred = creds[found[0]];
      if (!cred) throw { code: 'auth/user-not-found' };
      email = cred.email;
    } else {
      const snap = await db.collection('users').where('name', '==', nameInput).limit(1).get();
      if (snap.empty) throw { code: 'auth/user-not-found' };
      email = snap.docs[0].data().email;
    }
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showAuthError(translateAuthError(e.code));
  }
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-password').value;
  if (!name||!email||!pass) return showAuthError('請填寫所有欄位');
  if (pass.length < 6) return showAuthError('密碼至少需要 6 個字元');
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role: 'member', createdAt: FV.serverTimestamp()
    });
  } catch(e) {
    showAuthError(translateAuthError(e.code));
  }
}

async function logout() {
  S.unsubs.forEach(u=>u());
  S.unsubs = [];
  await auth.signOut();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function translateAuthError(code) {
  const map = {
    'auth/user-not-found'       : '帳號不存在',
    'auth/wrong-password'       : '密碼錯誤',
    'auth/invalid-credential'   : '帳號或密碼錯誤',
    'auth/invalid-login-credentials': '帳號或密碼錯誤',
    'auth/email-already-in-use' : '此 Email 已被使用',
    'auth/invalid-email'        : 'Email 格式不正確',
    'auth/weak-password'        : '密碼強度不足',
    'auth/too-many-requests'    : '嘗試次數過多，請稍後再試',
  };
  return map[code] || '帳號或密碼錯誤';
}

const ADMIN_EMAIL = 'admin@qualitycoe.com';
const ADMIN_PASS  = '1QAZWSX';

async function seedAdminAccount() {
  if (localStorage.getItem('pf_admin_seeded')) return;
  try {
    if (DEMO_MODE) {
      const creds = JSON.parse(localStorage.getItem('pf_credentials')||'{}');
      if (!Object.values(creds).find(u=>u.email===ADMIN_EMAIL)) {
        const uid = 'admin_fixed_uid';
        creds[uid] = { email:ADMIN_EMAIL, _pw:ADMIN_PASS };
        localStorage.setItem('pf_credentials', JSON.stringify(creds));
        const col = JSON.parse(localStorage.getItem('pf_users')||'{}');
        col[uid] = { name:'Admin', email:ADMIN_EMAIL, role:'admin', createdAt:{seconds:Math.floor(Date.now()/1000)} };
        localStorage.setItem('pf_users', JSON.stringify(col));
      }
      localStorage.setItem('pf_admin_seeded','1');
    } else {
      // Firebase：建立管理員帳號，再立刻登出
      const cred = await auth.createUserWithEmailAndPassword(ADMIN_EMAIL, ADMIN_PASS);
      await db.collection('users').doc(cred.user.uid).set({
        name:'Admin', email:ADMIN_EMAIL, role:'admin',
        createdAt: FV.serverTimestamp()
      });
      await auth.signOut();
      localStorage.setItem('pf_admin_seeded','1');
    }
  } catch(e) {
    if (e.code==='auth/email-already-in-use') localStorage.setItem('pf_admin_seeded','1');
  }
}

// 先完成 admin seed，再啟動 auth 監聽，避免競爭條件
(async () => {
  await seedAdminAccount();
  auth.onAuthStateChanged(async user => {
    if (user) {
      S.user = user;
      await loadUserProfile();
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initApp();
    } else {

      document.getElementById('auth-screen').style.display = 'flex';

    }
  });
})();

async function loadUserProfile() {
  const doc = await db.collection('users').doc(S.user.uid).get();
  if (doc.exists) {
    S.profile = { uid: S.user.uid, ...doc.data() };
  } else {
    // profile doc 不存在時，用 displayName 或 email 前綴當名字
    const fallbackName = S.user.displayName || S.user.email.split('@')[0];
    S.profile = { uid: S.user.uid, name: fallbackName, email: S.user.email, role: 'member' };
    // 順便補存 profile
    await db.collection('users').doc(S.user.uid).set(S.profile).catch(()=>{});
  }
  S.users[S.user.uid] = S.profile; // 一定快取，讓指派下拉選單能找到自己
}

function initApp() {
  renderSidebar();
  subscribeProjects();
  showView('home');
}

// =============================================
// SUBSCRIPTIONS
// =============================================
function subscribeProjects() {
  // 管理員看所有專案，一般成員只看自己參與的
  const isAdmin = S.profile?.role === 'admin';
  const query = isAdmin
    ? db.collection('projects')
    : db.collection('projects').where('members', 'array-contains', S.user.uid);

  const unsub = query.onSnapshot(snap => {
    S.projects = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
    renderSidebarProjects();
    if (S.currentProject) {
      const updated = S.projects.find(p=>p.id===S.currentProject.id);
      if (updated) S.currentProject = updated;
    }
    if (document.getElementById('content').dataset.view === 'home') renderHome();
    if (document.getElementById('content').dataset.view === 'projects') renderProjectsList();
  });
  S.unsubs.push(unsub);
}

function subscribeProjectItems(projectId) {
  S.unsubs.filter(u=>u._isItemSub).forEach(u=>u());
  const unsub = db.collection('items')
    .where('projectId', '==', projectId)
    .onSnapshot(snap => {
      S.items = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
      S.allItems = [...S.allItems.filter(i=>i.projectId!==projectId), ...S.items];
      renderProjectContent();
      if (S.panelItem) {
        const updated = S.items.find(i=>i.id===S.panelItem.id);
        if (updated) { S.panelItem = updated; renderPanel(); }
      }
    });
  unsub._isItemSub = true;
  S.unsubs.push(unsub);
}

let listSort = { field:'createdAt', dir:-1 };

function renderList() {

    if (av?.seconds) av=av.seconds;
    if (bv?.seconds) bv=bv.seconds;
    if (av<bv) return -listSort.dir;
    if (av>bv) return listSort.dir;
    return 0;
  });

  const arrow = dir => dir>0?'▲':'▼';
  const th = (f,label) => `<th onclick="sortList('${f}')" style="cursor:pointer">${label}${listSort.field===f?' '+arrow(listSort.dir):''}</th>`;

          ${th('status','狀態')}
          ${th('priority','優先度')}
          <th>指派</th>
          ${th('dueDate','截止')}
          ${th('createdAt','建立')}
          <th>回報者</th>
        </tr></thead>
        <tbody>
          ${sorted.map(i=>`<tr onclick="openItemPanel('${i.id}')">
            <td>${typeIcon(i.type)}</td>
            <td style="color:#0052cc;font-weight:500;white-space:nowrap">${esc(i.key)}</td>
            <td style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.title)}</td>
            <td>${statusBadge(i.status)}</td>
            <td>${priorityBadge(i.priority)}</td>
            <td>${userChip(i.assignee)}</td>
            <td style="white-space:nowrap;color:${dueDateColor(i.dueDate)}">${formatDate(i.dueDate)||'—'}</td>
            <td style="white-space:nowrap;color:#6b778c;font-size:12px">${formatTs(i.createdAt)}</td>
            <td>${userChip(i.reporter)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      ${!S.items.length?'<div class="empty-state"><p>此專案尚無任務，點擊右上角「+ 建立」開始新增</p></div>':''}
    </div>`;
}

let _listFilter = '';
function filterByStatus(status) {
  _listFilter = status;
  if (!status) { renderList(); return; }
  const orig = S.items;
  S.items = orig.filter(i=>i.status===status);
  renderList();
  S.items = orig;
}

function sortList(field) {
  if (listSort.field===field) listSort.dir *= -1;
  else { listSort.field=field; listSort.dir=-1; }
  renderList();
}

    item = { id:doc.id, ...doc.data() };

  await loadProjectUsers(item.projectId);

  document.getElementById('panel-overlay').classList.add('open');

  renderPanel();

function closeItemPanel() {
  document.getElementById('item-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  S.panelItem = null;
}

function editDesc() {
  const el = document.getElementById('panel-desc');
  const actions = document.getElementById('panel-desc-actions');
  if (!el.isContentEditable || el.contentEditable==='false') {
    el.contentEditable = 'true';
    el.classList.add('editing');
    el.focus();
    if (actions) actions.style.display='flex';
    S._origDesc = el.textContent;
  }
}
function saveDesc() {
  const el = document.getElementById('panel-desc');
  const val = el.textContent.trim();
  el.contentEditable='false';
  el.classList.remove('editing');
  document.getElementById('panel-desc-actions').style.display='none';
  savePanelField('description', val==='（點擊新增說明）'?'':val);
}
function cancelDesc() {
  const el = document.getElementById('panel-desc');
  el.textContent = S._origDesc || '';
  el.contentEditable='false';
  el.classList.remove('editing');
  document.getElementById('panel-desc-actions').style.display='none';
}

async function savePanelField(field, value) {
  if (!S.panelItem) return;
  await db.collection('items').doc(S.panelItem.id).update({
    [field]: value,
    updatedAt: FV.serverTimestamp()
  });
  S.panelItem[field] = value;
  toast('已更新', 'success');
}

async function deleteCurrentItem() {
  if (!S.panelItem) return;
  if (!confirm(`確定要刪除 ${S.panelItem.key}？`)) return;
  await db.collection('items').doc(S.panelItem.id).delete();
  closeItemPanel();
  toast('已刪除', 'success');
}

async function addComment() {
  const input = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content || !S.panelItem) return;
  await db.collection('comments').add({
    itemId: S.panelItem.id,
    content,
    authorId: S.user.uid,
    createdAt: FV.serverTimestamp()
  });
  input.value = '';
  renderPanel();
}

async function saveItem() {
  const title = document.getElementById('item-title').value.trim();
  if (!title) { toast('請填寫標題', 'error'); return; }
  if (!S.currentProject) { toast('請先選擇專案', 'error'); return; }

  const projRef = db.collection('projects').doc(S.currentProject.id);
  let itemKey;

  await db.runTransaction(async tx => {
    const projDoc = await tx.get(projRef);
    const counter = (projDoc.data().counter||0) + 1;
    itemKey = `${S.currentProject.key}-${counter}`;
    tx.update(projRef, { counter });
    tx.set(db.collection('items').doc(), {
      projectId: S.currentProject.id,
      key: itemKey,
      type: document.getElementById('item-type').value,
      title,
      description: document.getElementById('item-desc').value.trim(),
      status: document.getElementById('item-status').value,
      priority: document.getElementById('item-priority').value,
      assignee: document.getElementById('item-assignee').value,
      reporter: S.user.uid,
      dueDate: document.getElementById('item-due').value,
      links: [],
      createdAt: FV.serverTimestamp(),
      updatedAt: FV.serverTimestamp()
    });
  });

  closeModal('modal-item');
  toast(`已建立 ${itemKey}`, 'success');
}

function openLinkModal() {
  document.getElementById('link-search').value='';
  document.getElementById('link-target-id').value='';
  document.getElementById('link-selected').textContent='';
  document.getElementById('link-search-results').style.display='none';
  openModal('modal-link');
}

function searchLinkItems() {
  const q = document.getElementById('link-search').value.toLowerCase();
  const results = document.getElementById('link-search-results');
  if (!q) { results.style.display='none'; return; }
  const matches = S.allItems.filter(i=>
    i.id !== S.panelItem?.id &&
    (i.key.toLowerCase().includes(q) || i.title.toLowerCase().includes(q))
  ).slice(0,10);
  if (!matches.length) { results.innerHTML='<div style="padding:10px;color:#6b778c;font-size:13px">無結果</div>'; results.style.display='block'; return; }
  results.innerHTML = matches.map(i=>`
    <div onclick="selectLinkTarget('${i.id}','${esc(i.key)}','${esc(i.title)}')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px" onmouseover="this.style.background='#f4f5f7'" onmouseout="this.style.background=''">
      ${typeIcon(i.type)} <span style="color:#0052cc;font-weight:500">${esc(i.key)}</span> ${esc(i.title)}
    </div>`).join('');
  results.style.display='block';
}

function selectLinkTarget(id, key, title) {
  document.getElementById('link-target-id').value=id;
  document.getElementById('link-selected').innerHTML=`已選擇：<strong>${esc(key)}</strong> ${esc(title)}`;
  document.getElementById('link-search-results').style.display='none';
  document.getElementById('link-search').value=key+' '+title;
}

async function addLink() {
  const targetId = document.getElementById('link-target-id').value;
  const linkType = document.getElementById('link-type').value;
  if (!targetId || !S.panelItem) { toast('請先選擇要連結的任務', 'error'); return; }

  const target = S.allItems.find(i=>i.id===targetId);
  if (!target) return;

  const existing = (S.panelItem.links||[]);
  if (existing.find(l=>l.targetId===targetId)) { toast('已連結此項目', 'error'); return; }

  const newLinks = [...existing, { type:linkType, targetId, targetKey:target.key, targetTitle:target.title }];
  await db.collection('items').doc(S.panelItem.id).update({ links:newLinks, updatedAt: FV.serverTimestamp() });
  S.panelItem.links = newLinks;
  closeModal('modal-link');
  renderPanel();
  toast('連結已新增', 'success');
}

async function removeLink(itemId, targetId) {
  const item = S.items.find(i=>i.id===itemId) || S.panelItem;
  if (!item) return;
  const newLinks = (item.links||[]).filter(l=>l.targetId!==targetId);
  await db.collection('items').doc(itemId).update({ links:newLinks, updatedAt: FV.serverTimestamp() });
  if (S.panelItem?.id===itemId) { S.panelItem.links=newLinks; renderPanel(); }
  toast('連結已移除', 'success');
}

async function saveProject() {
  const name  = document.getElementById('proj-name').value.trim();
  const key   = document.getElementById('proj-key').value.trim().toUpperCase();
  const desc  = document.getElementById('proj-desc').value.trim();
  const color = document.getElementById('proj-color').value;
  const editId = document.getElementById('proj-edit-id').value;
  if (!name||!key) { toast('請填寫名稱與代號', 'error'); return; }
  if (!/^[A-Z0-9]{1,6}$/.test(key)) { toast('代號限 1-6 個英數字元', 'error'); return; }

  if (editId) {
    // 編輯模式
    await db.collection('projects').doc(editId).update({ name, description:desc, color });
    closeModal('modal-project');
    toast('專案已更新', 'success');
    if (S.currentProject?.id === editId) renderProjectTopbar();
  } else {
    // 新增模式
    const ref = await db.collection('projects').add({
      name, key, description:desc, color,
      members: [S.user.uid],
      createdBy: S.user.uid,
      counter: 0,
      createdAt: FV.serverTimestamp()
    });
    closeModal('modal-project');
    toast(`專案 ${key} 已建立`, 'success');
    showView('project', ref.id);
  }
}

async function deleteProject(projectId) {
  const p = S.projects.find(pr=>pr.id===projectId);
  if (!p) return;
  if (!confirm(`確定要刪除專案「${p.name}」？\n此操作無法復原，專案內所有任務也會一併刪除。`)) return;

  // 刪除所有 items
  const itemsSnap = await db.collection('items').where('projectId','==',projectId).get();
  const batch = [];
  itemsSnap.docs.forEach(d => batch.push(db.collection('items').doc(d.id).delete()));
  await Promise.all(batch);

  await db.collection('projects').doc(projectId).delete();
  toast('專案已刪除', 'success');
  if (S.currentProject?.id === projectId) showView('projects');
}

async function inviteMember() {
  const email = document.getElementById('invite-email').value.trim().toLowerCase();
  const role  = document.getElementById('invite-role').value;
  if (!email) { toast('請填寫 Email', 'error'); return; }

  // find user by email
  const snap = await db.collection('users').where('email','==',email).limit(1).get();
  if (snap.empty) { toast('找不到此 Email 的帳號，請確認對方已完成註冊', 'error'); return; }

  const targetUid = snap.docs[0].id;
  if (!S.currentProject) { toast('請先選擇專案', 'error'); return; }

  const members = S.currentProject.members || [];
  if (members.includes(targetUid)) { toast('此成員已在專案中', 'error'); return; }

  await db.collection('projects').doc(S.currentProject.id).update({
    members: FV.arrayUnion(targetUid)
  });

  // update role in global users if admin
  if (role === 'admin') {
    await db.collection('users').doc(targetUid).update({ role: 'admin' });
  }

  closeModal('modal-invite');
  toast(`已邀請 ${email}`, 'success');
}

async function saveEditMember() {

  if (uid === S.user.uid) { S.profile.name = name; S.profile.role = role; renderSidebar(); }
  closeModal('modal-edit-member');

async function deleteMember(uid, name) {
  if (!confirm(`確定要移除成員「${name}」？\n此操作將把該成員從所有專案中移除。`)) return;
  // 從所有專案移除
  const projSnap = await db.collection('projects').get();
  await Promise.all(projSnap.docs.map(d => {
    const members = d.data().members || [];
    if (members.includes(uid)) {
      return db.collection('projects').doc(d.id).update({
        members: members.filter(m => m !== uid)
      });
    }
  }));
  // 刪除 user doc
  await db.collection('users').doc(uid).delete();
  delete S.users[uid];
  toast(`成員 ${name} 已移除`, 'success');
  renderAdmin();
}

  const email = document.getElementById('new-member-email').value.trim().toLowerCase();
  const pass  = document.getElementById('new-member-pass').value;
  const role  = document.getElementById('new-member-role').value;
  if (!name||!email||!pass) { toast('請填寫所有欄位','error'); return; }
  if (pass.length < 6) { toast('密碼至少 6 位','error'); return; }

  // 儲存目前登入狀態，建完帳號後恢復
  const savedUser = S.user;
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role, createdAt: FV.serverTimestamp()
    });
    // 如果不是 demo mode，建完帳號會被自動登入，需登出再讓原本 admin 重新登入
    if (!DEMO_MODE) {
      await auth.signOut();
      toast(`帳號已建立：${email}（請重新登入）`, 'success');
    } else {
      toast(`帳號已建立：${email}`, 'success');
    }
    closeModal('modal-invite-admin');
    renderAdmin();
  } catch(e) {
    toast(translateAuthError(e.code), 'error');
  }
}

// =============================================
// HELPERS / FORMATTERS
// =============================================
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function typeIcon(type) {
  const map = { task:'T', bug:'B', feature:'F', issue:'!' };
  return `<span class="type-icon type-${type||'task'}">${map[type]||'T'}</span>`;
}
function typeLabel(type) {
  return { task:'任務 Task', bug:'錯誤 Bug', feature:'功能 Feature', issue:'問題 Issue' }[type]||type;
}
function statusBadge(s) {
  const map={todo:'badge-todo',in_progress:'badge-progress',testing:'badge-testing',done:'badge-done'};
  const lbl={todo:'待處理',in_progress:'進行中',testing:'測試中',done:'完成'};
  return `<span class="badge ${map[s]||'badge-todo'}">${lbl[s]||s}</span>`;
}
function priorityBadge(p) {
  const map={highest:'badge-highest',high:'badge-high',medium:'badge-medium',low:'badge-low',lowest:'badge-lowest'};
  const lbl={highest:'最高',high:'高',medium:'中',low:'低',lowest:'最低'};
  return `<span class="badge ${map[p]||'badge-medium'}">${lbl[p]||p}</span>`;
}
function priorityLabel(p) {
  return {highest:'最高 Highest',high:'高 High',medium:'中 Medium',low:'低 Low',lowest:'最低 Lowest'}[p]||p;
}
function priorityColor(p) {
  return {highest:'#de350b',high:'#ff8b00',medium:'#f59e0b',low:'#36b37e',lowest:'#dfe1e6'}[p]||'#dfe1e6';
}
function linkTypeLabel(t) {
  return {relates_to:'相關於',blocks:'阻擋',is_blocked_by:'被阻擋',duplicates:'重複',is_duplicated_by:'被重複'}[t]||t;
}
function userChip(uid) {
  if (!uid) return '<span style="color:#6b778c;font-size:12px">—</span>';
  const u = S.users[uid];
  const name = u?.name || uid.substring(0,8);
  return `<div style="display:flex;align-items:center;gap:5px">
    <div class="user-avatar" style="width:22px;height:22px;font-size:10px;background:${avatarColor(name)}">${initials(name)}</div>
    <span style="font-size:12px">${esc(name)}</span>
  </div>`;
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  if (parts.length>=2) return (parts[0][0]+parts[1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}
const AVATAR_COLORS = ['#0052cc','#36b37e','#ff5630','#6554c0','#ff8b00','#00b8d9','#57d9a3','#ff991f'];
function avatarColor(name) {
  if (!name) return AVATAR_COLORS[0];
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffffffff;
  return AVATAR_COLORS[Math.abs(h)%AVATAR_COLORS.length];
}
function formatDate(d) {
  if (!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
}
function formatTs(ts) {
  if (!ts) return '';
  const d = ts.seconds ? new Date(ts.seconds*1000) : new Date(ts);
  return d.toLocaleDateString('zh-TW',{year:'numeric',month:'short',day:'numeric'});
}
function dueDateColor(d) {
  if (!d) return 'inherit';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(d+'T00:00:00');
  if (due < today) return '#de350b';
  if ((due-today)/(86400000) <= 3) return '#ff8b00';
  return 'inherit';
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function showUserMenu() {
  // simple — just navigate to admin or show logout
  if (S.profile?.role==='admin') showView('admin');
}

// enter key on auth forms
document.getElementById('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
document.getElementById('reg-password').addEventListener('keydown', e=>{ if(e.key==='Enter') register(); });
</script>
