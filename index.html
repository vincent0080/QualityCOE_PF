<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality COE Project Flow</title>
<script>!function(){var t=localStorage.getItem('pf_theme');if(t)document.documentElement.setAttribute('data-theme',t)}()</script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC',sans-serif;background:#f4f5f7;color:#172b4d;height:100vh;overflow:hidden;font-size:15px}
input,select,textarea,button{font-family:inherit;font-size:inherit}
:root{
  --sidebar:#1e2a3a;--sidebar-hover:#2c3e52;--sidebar-active:#3a506b;--sidebar-text:#b8c4d0;
  --accent:#0052cc;--accent-h:#0065ff;--accent-light:#deebff;
  --bg:#f4f5f7;--white:#fff;--border:#dfe1e6;
  --txt:#172b4d;--txt2:#6b778c;
  --todo:#dfe1e6;--prog:#deebff;--test:#fff0b3;--done:#e3fcef;
  --done-txt:#006644;--prog-txt:#0052cc;--test-txt:#974f0c;
  --r4:4px;--r6:6px;--shadow:0 1px 4px rgba(0,0,0,.15)
}
/* ===== DARK MODE ===== */
[data-theme="dark"]{
  --bg:#0d1117;--white:#161b22;--border:#30363d;
  --txt:#c9d1d9;--txt2:#8b949e;
  --sidebar:#010409;--sidebar-hover:#1c2128;--sidebar-active:#21262d;--sidebar-text:#8b949e;
  --accent:#79c0ff;--accent-h:#a5d6ff;--accent-light:#1f3a5f;
  --todo:#21262d;--prog:#1f3a5f;--test:#3d2f00;--done:#1a3a2a;
  --done-txt:#56d364;--prog-txt:#79c0ff;--test-txt:#d29922;
  --shadow:0 1px 4px rgba(0,0,0,.5);
}
body[data-theme="dark"]{background:var(--bg);color:var(--txt)}
body[data-theme="dark"] #topbar{background:#161b22;border-color:var(--border)}
body[data-theme="dark"] .topbar-title{color:var(--txt)}
body[data-theme="dark"] #theme-btn{border-color:var(--border);color:var(--txt2)}
body[data-theme="dark"] #theme-btn:hover{background:#21262d;color:var(--txt)}
body[data-theme="dark"] .view-tabs{background:#0d1117}
body[data-theme="dark"] .view-tab{color:#8b949e}
body[data-theme="dark"] .view-tab.active{background:#21262d;color:var(--txt)}
body[data-theme="dark"] .search-box{background:#21262d;border-color:var(--border)}
body[data-theme="dark"] .search-box input{color:var(--txt)}
body[data-theme="dark"] .board-col{background:#21262d}
body[data-theme="dark"] .board-col-title{color:#8b949e}
body[data-theme="dark"] .board-col-count{background:#30363d;color:#8b949e}
body[data-theme="dark"] .board-card{background:#161b22}
body[data-theme="dark"] .board-card-title{color:var(--txt)}
body[data-theme="dark"] .board-card-key{color:var(--txt2)}
body[data-theme="dark"] .add-card-btn{color:#8b949e}
body[data-theme="dark"] .add-card-btn:hover{background:#30363d;color:var(--txt)}
body[data-theme="dark"] .list-wrap{background:#161b22}
body[data-theme="dark"] .list-table th{background:#21262d;color:#8b949e;border-color:var(--border)}
body[data-theme="dark"] .list-table td{border-color:var(--border);color:var(--txt)}
body[data-theme="dark"] .list-table tr:hover td{background:#1c2128}
body[data-theme="dark"] .list-toolbar{border-color:var(--border)}
body[data-theme="dark"] #item-panel{background:#161b22}
body[data-theme="dark"] .panel-header{border-color:var(--border)}
body[data-theme="dark"] .panel-footer{border-color:var(--border)}
body[data-theme="dark"] .panel-section-title{color:#8b949e}
body[data-theme="dark"] .panel-key{color:#8b949e}
body[data-theme="dark"] .panel-title-input{color:var(--txt);background:transparent}
body[data-theme="dark"] .panel-title-input:hover,body[data-theme="dark"] .panel-title-input:focus{background:#0d1117}
body[data-theme="dark"] .panel-desc{color:var(--txt)}
body[data-theme="dark"] .panel-desc:hover{background:#0d1117;border-color:var(--border)}
body[data-theme="dark"] .meta-label{color:#8b949e}
body[data-theme="dark"] .meta-value{color:var(--txt)}
body[data-theme="dark"] .meta-select{color:var(--txt);background:transparent}
body[data-theme="dark"] .meta-select:hover{background:#0d1117;border-color:var(--border)}
body[data-theme="dark"] .meta-select:focus{background:#161b22;border-color:#79c0ff}
body[data-theme="dark"] .link-item{background:#21262d}
body[data-theme="dark"] .comment-content{background:#21262d}
body[data-theme="dark"] .comment-author{color:var(--txt)}
body[data-theme="dark"] .comment-text{color:var(--txt)}
body[data-theme="dark"] .comment-input-wrap textarea{background:#0d1117;color:var(--txt);border-color:var(--border)}
body[data-theme="dark"] .modal{background:#161b22}
body[data-theme="dark"] .modal-header h3{color:var(--txt)}
body[data-theme="dark"] .close-btn{color:#8b949e}
body[data-theme="dark"] .form-group label{color:var(--txt)}
body[data-theme="dark"] .form-group input,body[data-theme="dark"] .form-group select,body[data-theme="dark"] .form-group textarea{background:#0d1117;color:var(--txt);border-color:var(--border)}
body[data-theme="dark"] .form-group input:focus,body[data-theme="dark"] .form-group select:focus,body[data-theme="dark"] .form-group textarea:focus{border-color:#79c0ff}
body[data-theme="dark"] #link-search-results{background:#161b22;border-color:var(--border)}
body[data-theme="dark"] #link-search-results div{color:var(--txt)}
body[data-theme="dark"] #link-search-results div:hover{background:#21262d !important}
body[data-theme="dark"] .btn-secondary{background:#21262d;color:var(--txt);border-color:var(--border)}
body[data-theme="dark"] .btn-secondary:hover{background:#30363d}
body[data-theme="dark"] .member-card{background:#21262d;border-color:var(--border)}
body[data-theme="dark"] .project-card{background:#161b22;color:var(--txt)}
body[data-theme="dark"] .project-card .stat-num{color:var(--txt)}
body[data-theme="dark"] .project-card .stat-lbl{color:var(--txt2)}
body[data-theme="dark"] .project-card h3{color:var(--txt)}
body[data-theme="dark"] .project-card p{color:var(--txt2)}
body[data-theme="dark"] .project-card-add{background:#21262d !important;border-top-color:#30363d !important}
body[data-theme="dark"] .project-card-add .add-label{color:var(--txt2) !important}

/* ===== AUTH ===== */
#auth-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e2a3a 0%,#0052cc 100%)}
.auth-box{background:#fff;border-radius:12px;padding:40px;width:400px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:26px;color:#0052cc;font-weight:700}
.auth-logo p{color:#6b778c;font-size:13px;margin-top:4px}
.auth-tabs{display:flex;border-bottom:2px solid #dfe1e6;margin-bottom:24px}
.auth-tab{flex:1;text-align:center;padding:10px;cursor:pointer;color:#6b778c;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}
.auth-tab.active{color:#0052cc;border-bottom-color:#0052cc}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#172b4d;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:2px solid #dfe1e6;border-radius:4px;font-size:14px;color:#172b4d;transition:.2s;background:#fff}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#0052cc;outline:none}
.btn{padding:9px 18px;border-radius:4px;border:none;cursor:pointer;font-size:14px;font-weight:500;transition:.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.btn-primary{background:#0052cc;color:#fff}.btn-primary:hover{background:#0065ff}
.btn-secondary{background:#f4f5f7;color:#172b4d;border:1px solid #dfe1e6}.btn-secondary:hover{background:#ebecf0}
.btn-danger{background:#de350b;color:#fff}.btn-danger:hover{background:#ff5630}
.btn-ghost{background:transparent;color:#6b778c;border:none}.btn-ghost:hover{background:#f4f5f7;color:#172b4d}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.auth-error{background:#ffebe6;color:#de350b;padding:10px 12px;border-radius:4px;font-size:13px;margin-bottom:16px;display:none}

/* ===== APP LAYOUT ===== */
#app{display:flex;height:100vh;display:none}
#sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;min-height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0;overflow:visible;position:relative;z-index:100}
#content{flex:1;overflow-y:auto;padding:24px}

/* ===== SIDEBAR ===== */
.sidebar-logo{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo span{color:#fff;font-size:17px;font-weight:700}
.sidebar-logo .logo-icon{width:32px;height:32px;background:#0052cc;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.sidebar-section{padding:16px 0 8px}
.sidebar-section-title{padding:0 20px 6px;font-size:11px;font-weight:600;color:#7a8fa0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;color:var(--sidebar-text);font-size:13.5px;transition:.15s;border-left:3px solid transparent}
.sidebar-item:hover{background:var(--sidebar-hover);color:#fff}
.sidebar-item.active{background:var(--sidebar-active);color:#fff;border-left-color:#0052cc}
.sidebar-item svg{flex-shrink:0;opacity:.7}
.sidebar-item.active svg,.sidebar-item:hover svg{opacity:1}
.project-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sidebar-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
.sidebar-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.08);padding:16px 20px}
.user-info{display:flex;align-items:center;gap:10px;cursor:pointer}
.user-info:hover .user-name{color:#fff}
.user-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{color:var(--sidebar-text);font-size:13px;font-weight:500}
.user-role{color:#7a8fa0;font-size:11px}

/* ===== TOPBAR ===== */
.topbar-title{font-size:16px;font-weight:600;color:#172b4d;display:flex;align-items:center;gap:8px;flex-shrink:0;white-space:nowrap}
.topbar-actions{display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow-x:auto;scrollbar-width:none}
.topbar-actions::-webkit-scrollbar{display:none}
.view-tabs{display:flex;gap:2px;background:#f4f5f7;border-radius:6px;padding:3px}
.view-tab{padding:5px 14px;border-radius:4px;cursor:pointer;font-size:13px;color:#6b778c;transition:.15s}
.view-tab.active{background:#fff;color:#172b4d;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.search-box{display:flex;align-items:center;gap:8px;background:#f4f5f7;border:1px solid #dfe1e6;border-radius:4px;padding:6px 12px}
.search-box input{border:none;background:transparent;font-size:13px;color:#172b4d;width:180px;outline:none}
.search-box input::placeholder{color:#6b778c}

/* ===== BOARDS ===== */
.board-wrap{display:flex;gap:16px;padding-bottom:16px;min-height:calc(100vh - 140px)}
.board-col{flex:1;min-width:200px;background:#ebecf0;border-radius:8px;display:flex;flex-direction:column}
.board-col-header{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.board-col-title{font-size:12px;font-weight:600;color:#5e6c84}
.board-col-count{background:#dfe1e6;color:#5e6c84;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px}
.board-col-items{padding:0 8px 8px;flex:1;overflow-y:auto;min-height:60px}
.board-card{background:#fff;border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;box-shadow:var(--shadow);transition:.15s;border-left:3px solid transparent}
.board-card:hover{box-shadow:0 3px 10px rgba(0,0,0,.15);transform:translateY(-1px)}
@keyframes overdueFlash{0%,100%{box-shadow:0 0 0 2px #de350b,var(--shadow)}50%{box-shadow:var(--shadow)}}
.card-overdue{animation:overdueFlash 1.2s ease-in-out infinite}
.row-overdue td{background:#fff0f0 !important}
.board-card-key{font-size:11px;color:#6b778c;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.board-card-title{font-size:13.5px;color:#172b4d;line-height:1.4;margin-bottom:10px}
.board-card-footer{display:flex;align-items:center;justify-content:space-between}
.add-card-btn{width:100%;padding:8px;background:transparent;border:none;cursor:pointer;color:#6b778c;font-size:13px;text-align:left;border-radius:4px;margin:0 8px 8px;transition:.15s}
.add-card-btn:hover{background:#d4d8e0;color:#172b4d}

/* ===== LIST VIEW ===== */
.list-wrap{background:#fff;border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.list-toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
table.list-table{width:100%;border-collapse:collapse;font-size:13px}
.list-table th{padding:10px 14px;background:#f4f5f7;color:#6b778c;font-weight:600;font-size:11px;border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer}
.list-table th:hover{background:#ebecf0}
.list-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.list-table tr:hover td{background:#f8f9fa;cursor:pointer}
.list-table tr:last-child td{border-bottom:none}

/* ===== BADGES ===== */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-todo{background:#dfe1e6;color:#42526e}
.badge-progress{background:#deebff;color:#0052cc}
.badge-testing{background:#fff0b3;color:#974f0c}
.badge-done{background:#e3fcef;color:#006644}
.badge-highest{background:#ffebe6;color:#de350b}
.badge-high{background:#fff0b3;color:#974f0c}
.badge-medium{background:#fffae6;color:#5e4a00}
.badge-low{background:#e3fcef;color:#006644}
.badge-lowest{background:#f4f5f7;color:#6b778c}
.type-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:700;color:#fff}
.type-task{background:#4c9aff}
.type-bug{background:#ff5630}
.type-feature{background:#36b37e}
.type-issue{background:#ff8b00}

/* ===== ITEM DETAIL PANEL ===== */
#item-panel{position:fixed;top:0;right:-700px;width:680px;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);z-index:200;transition:.3s ease;display:flex;flex-direction:column}
#item-panel.open{right:0}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.panel-key{font-size:12px;color:#6b778c;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:20px}
.panel-footer{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.panel-section{margin-bottom:24px}
.panel-section-title{font-size:11px;font-weight:700;color:#6b778c;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.panel-title-input{font-size:20px;font-weight:600;color:#172b4d;border:none;width:100%;outline:none;padding:4px 0;margin-bottom:8px;background:transparent}
.panel-title-input:hover{background:#f4f5f7;padding:4px 8px;border-radius:4px}
.panel-title-input:focus{background:#f4f5f7;padding:4px 8px;border-radius:4px}
.panel-desc{min-height:60px;border:1px solid transparent;border-radius:4px;padding:8px;font-size:14px;color:#172b4d;cursor:pointer;line-height:1.6;white-space:pre-wrap}
.panel-desc:hover{border-color:var(--border);background:#fafbfc}
.panel-desc.editing{border-color:#0052cc;background:#fff;cursor:text;outline:none}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.meta-item{display:flex;flex-direction:column;gap:4px}
.meta-label{font-size:11px;color:#6b778c;font-weight:600}
.meta-value{font-size:13px;color:#172b4d}
.meta-select{border:1px solid transparent;border-radius:4px;padding:5px 8px;font-size:13px;color:#172b4d;cursor:pointer;background:transparent;width:100%}
.meta-select:hover{border-color:var(--border);background:#f4f5f7}
.meta-select:focus{border-color:#0052cc;outline:none;background:#fff}
.link-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f4f5f7;border-radius:4px;margin-bottom:6px;font-size:13px}
.link-type{font-size:11px;color:#6b778c;font-style:italic;min-width:90px}
.link-key{color:#0052cc;cursor:pointer;font-weight:500}
.link-key:hover{text-decoration:underline}
.comment-item{display:flex;gap:10px;margin-bottom:16px}
.comment-content{flex:1;background:#f4f5f7;border-radius:6px;padding:10px 12px}
.comment-author{font-size:12px;font-weight:600;color:#172b4d;margin-bottom:4px}
.comment-time{font-size:11px;color:#6b778c}
.comment-text{font-size:13.5px;color:#172b4d;line-height:1.5;white-space:pre-wrap}
.comment-input-wrap{display:flex;gap:10px;align-items:flex-start}
.comment-input-wrap textarea{flex:1;border:2px solid var(--border);border-radius:6px;padding:10px;font-size:13.5px;resize:vertical;min-height:60px;font-family:inherit;transition:.2s}
.comment-input-wrap textarea:focus{border-color:#0052cc;outline:none}

/* ===== MODALS ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(9,30,66,.5);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:8px;width:500px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(9,30,66,.25)}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:18px;font-weight:600;color:#172b4d}
.modal-body{padding:20px 24px}
.modal-footer{padding:0 24px 20px;display:flex;justify-content:flex-end;gap:10px}
.close-btn{background:none;border:none;cursor:pointer;color:#6b778c;font-size:20px;line-height:1;padding:4px}
.close-btn:hover{color:#172b4d}
.panel-overlay{position:fixed;inset:0;background:rgba(9,30,66,.4);z-index:199;display:none}
.panel-overlay.open{display:block}

/* ===== HOME / DASHBOARD ===== */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:28px}
.project-card{background:#fff;border-radius:8px;padding:20px;box-shadow:var(--shadow);cursor:pointer;transition:.2s;border-top:4px solid #0052cc}
.project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-2px)}
.project-card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.project-card p{font-size:13px;color:#6b778c;margin-bottom:14px;line-height:1.4}
.project-stats{display:flex;gap:6px;flex-wrap:nowrap}
.stat{flex:1;min-width:0;text-align:center;background:#f4f5f7;border-radius:6px;padding:6px 4px}
.stat-num{font-size:16px;font-weight:700;color:#172b4d}
.stat-lbl{font-size:11px;color:#6b778c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-header h2{font-size:16px;font-weight:600}

/* ===== ADMIN ===== */
.members-table{width:100%;background:#fff;border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.members-table th,.members-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.members-table th{background:#f4f5f7;font-weight:600;font-size:11px;text-transform:uppercase;color:#6b778c}
.role-badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.role-admin{background:#deebff;color:#0052cc}
.role-member{background:#e3fcef;color:#006644}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:6px;font-size:13.5px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s ease;max-width:320px}
.toast-success{background:#36b37e;color:#fff}
.toast-error{background:#de350b;color:#fff}
.toast-info{background:#0052cc;color:#fff}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* ===== MISC ===== */
.empty-state{text-align:center;padding:48px 24px;color:#6b778c}
.empty-state svg{margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
.priority-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-highest{background:#de350b}.dot-high{background:#ff8b00}.dot-medium{background:#f59e0b}.dot-low{background:#36b37e}.dot-lowest{background:#6b778c}
.overlay-close{cursor:pointer}
.tag{display:inline-block;background:#deebff;color:#0052cc;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;margin:2px}
select option{color:#172b4d}
.color-swatch{display:inline-block;width:14px;height:14px;border-radius:3px;margin-right:5px;vertical-align:middle}
.drag-over{background:#c8d4e0 !important}
.hint{font-size:11px;color:#6b778c;margin-top:4px}
/* ===== CUSTOM AVATAR SELECT ===== */
.c-sel{position:relative;cursor:pointer;user-select:none}
.c-sel-val{display:flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:4px;padding:5px 8px;min-height:36px;transition:.15s;font-size:15px}
.c-sel-val:hover{border-color:var(--border);background:var(--bg)}
.c-sel.open .c-sel-val{border-color:#0052cc;background:var(--white)}
.c-sel-arrow{margin-left:auto;color:var(--txt2);font-size:11px;flex-shrink:0}
.c-sel-opts{display:none;position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.15);z-index:500;max-height:230px;overflow-y:auto}
.c-sel-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;font-size:15px;transition:.1s}
.c-sel-opt:hover{background:var(--bg)}
.c-sel-opt.active{background:var(--accent-light);font-weight:500}
body[data-theme="dark"] .c-sel-opts{background:#161b22}
body[data-theme="dark"] .c-sel-opt:hover{background:#21262d}
body[data-theme="dark"] .c-sel-opt.active{background:#1f3a5f}

/* ===== FONT SCALE +4px ===== */
.auth-logo h1{font-size:30px}.auth-logo p{font-size:17px}
.form-group label{font-size:16px}
.form-group input,.form-group select,.form-group textarea{font-size:18px}
.btn{font-size:18px}.btn-sm{font-size:16px}
.auth-error{font-size:17px}
.sidebar-section-title{font-size:15px}
.sidebar-item{font-size:17.5px}
.user-name{font-size:17px}.user-role{font-size:15px}
.topbar-title{font-size:20px}
.view-tab{font-size:17px}
.search-box input{font-size:17px}
.board-col-title{font-size:16px}.board-col-count{font-size:15px}
.board-card-key{font-size:15px}.board-card-title{font-size:17.5px}
.add-card-btn{font-size:17px}
table.list-table{font-size:17px}
.list-table th{font-size:15px}
.badge{font-size:15px}
.type-icon{font-size:13px}
.panel-key{font-size:16px}.panel-section-title{font-size:15px}
.panel-title-input{font-size:24px}
.panel-desc{font-size:18px}
.meta-label{font-size:15px}.meta-value{font-size:17px}.meta-select{font-size:17px}
.link-item{font-size:17px}.link-type{font-size:15px}
.comment-author{font-size:16px}.comment-time{font-size:15px}
.comment-text{font-size:17.5px}
.comment-input-wrap textarea{font-size:17.5px}
.modal-header h3{font-size:22px}
.project-card h3{font-size:19px}.project-card p{font-size:17px}
.stat-num{font-size:22px}.stat-lbl{font-size:14px}
.section-header h2{font-size:20px}
.members-table th,.members-table td{font-size:17px}
.members-table th{font-size:15px}
.role-badge{font-size:15px}
.toast-item{font-size:17.5px}
.empty-state p{font-size:18px}
.tag{font-size:15px}.hint{font-size:15px}
/* ===== COMMENT EDIT / CHANGELOG ===== */
.comment-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.comment-edit-wrap{display:none;margin-top:6px}
.comment-edit-wrap textarea{width:100%;border:2px solid var(--border);border-radius:6px;padding:8px;resize:vertical;min-height:60px;font-family:inherit;font-size:inherit;background:var(--white);color:var(--txt);transition:.2s}
.comment-edit-wrap textarea:focus{border-color:#0052cc;outline:none}
.changelog{margin-top:8px;border-top:1px dashed var(--border);padding-top:6px}
.changelog-title{font-size:11px;font-weight:600;color:var(--txt2);margin-bottom:4px;letter-spacing:.5px}
.changelog-entry{font-size:11px;color:var(--txt2);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.4}
.changelog-entry:last-child{border-bottom:none}
body[data-theme="dark"] .comment-edit-wrap textarea{background:#0d1117;color:var(--txt);border-color:var(--border)}
/* ===== LANGUAGE ===== */
.lang-sec{font-size:.75em;opacity:.6;font-weight:400;margin-left:3px}
/* ===== COLOR SWATCH PICKER ===== */
.color-swatch-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;padding:8px 0}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch.selected{border-color:#172b4d;box-shadow:0 0 0 2px #fff,0 0 0 4px #172b4d}
body[data-theme="dark"] .color-swatch.selected{border-color:#c9d1d9;box-shadow:0 0 0 2px #161b22,0 0 0 4px #c9d1d9}
</style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>⚡ Quality COE Project Flow</h1>
      <p>專案管理系統</p>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="login-form">
      <div class="form-group"><label>帳號</label><input type="text" id="login-name" placeholder="輸入帳號名稱或 Email"></div>
      <div class="form-group"><label>密碼</label><input type="password" id="login-password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="login()">登入</button>
    </div>
    <!-- hidden stubs so existing JS refs don't error -->
    <div id="register-form" style="display:none">
      <input type="text" id="reg-name" style="display:none">
      <input type="email" id="reg-email" style="display:none">
      <input type="password" id="reg-password" style="display:none">
    </div>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="white">
          <path d="M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z"/>
        </svg>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1.3;flex:1;min-width:0">
        <span style="color:#fff;font-size:18px;font-weight:700;white-space:nowrap;letter-spacing:.01em">Quality COE</span>
        <span style="color:var(--sidebar-text);font-size:13px;font-weight:500;letter-spacing:.05em;white-space:nowrap">Project Flow</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-item" onclick="showView('home')" id="nav-home">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        首頁
      </div>
      <div class="sidebar-item" onclick="showView('projects')" id="nav-projects">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        所有專案
      </div>
      <div class="sidebar-item" onclick="showView('mywork')" id="nav-mywork">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zM5 3H3v2h2V3zm0 4H3v2h2V7zm0 4H3v2h2v-2zm0 4H3v2h2v-2zm0 4H3v2h2v-2zM21 3h-2v2h2V3zm0 4h-2v2h2V7zm0 4h-2v2h2v-2zm0 4h-2v2h2v-2zm0 4h-2v2h2v-2zM17 5H7v14h10V5z"/></svg>
        我的工作
        <span id="mywork-badge" style="margin-left:auto;background:#0052cc;color:#fff;border-radius:10px;padding:1px 8px;font-size:13px;font-weight:700;display:none;line-height:1.6"></span>
      </div>
      <div class="sidebar-item" onclick="showView('memberload')" id="nav-memberload">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        成員負載
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">我的專案</div>
      <div id="sidebar-projects"></div>
    </div>
    <div class="sidebar-divider"></div>
    <div id="sidebar-admin" style="display:none">
      <div class="sidebar-item" onclick="showView('admin')" id="nav-admin">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        管理員面板
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="user-info" onclick="showUserMenu()" style="cursor:pointer" title="修改密碼 / 管理員設定">
        <div class="user-avatar" id="sidebar-avatar"></div>
        <div style="flex:1;min-width:0">
          <div class="user-name" id="sidebar-name">載入中…</div>
          <div class="user-role" id="sidebar-role" style="font-size:11px;opacity:.7"></div>
        </div>
        <span style="color:var(--sidebar-text);font-size:16px;opacity:.5">⚙</span>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px;width:100%" onclick="logout()">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">首頁</div>
      <div class="topbar-actions" id="topbar-actions"></div>
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
        <div id="cal-wrap" style="position:relative">
          <span id="topbar-clock" onclick="toggleCalendar()" style="font-size:13px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:.03em;cursor:pointer;padding:3px 6px;border-radius:6px;transition:.15s" onmouseenter="this.style.background='var(--border)'" onmouseleave="this.style.background='transparent'"></span>
          <div id="calendar-popup" style="display:none;position:absolute;right:0;top:calc(100% + 10px);background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:500;user-select:none">
            <div id="cal-content"></div>
          </div>
        </div>
        <button id="theme-btn" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:14px;padding:4px 13px;cursor:pointer;font-size:16px;color:var(--txt2);white-space:nowrap;transition:.15s">🌙 深色</button>
        <div style="position:relative" id="lang-picker-wrap">
          <button onclick="toggleLangPicker()" style="background:none;border:1px solid var(--border);border-radius:14px;padding:4px 12px;cursor:pointer;font-size:15px;color:var(--txt2);white-space:nowrap;transition:.15s">🌐</button>
          <div id="lang-picker" style="display:none;position:absolute;right:0;top:calc(100% + 8px);background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px;min-width:220px;box-shadow:0 8px 24px rgba(0,0,0,.18);z-index:400">
            <div style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">主要語言</div>
            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-p" value="zh" onchange="applyLangChange()"> 中文</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-p" value="en" onchange="applyLangChange()"> English</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-p" value="vi" onchange="applyLangChange()"> Tiếng Việt</label>
            </div>
            <div style="font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">第二語言（雙語）</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-s" value="" onchange="applyLangChange()"> 無 / None</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-s" value="zh" onchange="applyLangChange()"> 中文</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-s" value="en" onchange="applyLangChange()"> English</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px"><input type="radio" name="lang-s" value="vi" onchange="applyLangChange()"> Tiếng Việt</label>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- ===== PANEL OVERLAY ===== -->
<div class="panel-overlay" id="panel-overlay" onclick="closeItemPanel()"></div>

<!-- ===== ITEM DETAIL PANEL ===== -->
<div id="item-panel">
  <div class="panel-header">
    <span class="panel-key" id="panel-key"></span>
    <div style="display:flex;gap:8px;margin-left:auto">
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentItem()">刪除</button>
      <button class="close-btn" onclick="closeItemPanel()">×</button>
    </div>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- ===== CREATE / EDIT PROJECT MODAL ===== -->
<div class="modal-overlay" id="modal-project">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-project-title">建立專案</h3>
      <button class="close-btn" onclick="closeModal('modal-project')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="proj-edit-id">
      <div class="form-group"><label>專案名稱</label><input type="text" id="proj-name" placeholder="例：前端重構專案"></div>
      <div class="form-group"><label>專案代號（英文縮寫）</label><input type="text" id="proj-key" placeholder="例：FE" maxlength="6" style="text-transform:uppercase"></div>
      <div class="form-group"><label>說明</label><textarea id="proj-desc" rows="3" placeholder="專案描述…"></textarea></div>
      <div class="form-group">
        <label>顏色</label>
        <div class="color-swatch-grid" id="proj-color-grid"></div>
        <input type="hidden" id="proj-color" value="#0052cc">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-project')">取消</button>
      <button class="btn btn-primary" id="proj-submit-btn" onclick="saveProject()">建立</button>
    </div>
  </div>
</div>

<!-- ===== CREATE ITEM MODAL ===== -->
<div class="modal-overlay" id="modal-item">
  <div class="modal" style="width:560px">
    <div class="modal-header">
      <h3 id="modal-item-title">建立任務</h3>
      <button class="close-btn" onclick="closeModal('modal-item')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>類型</label>
        <select id="item-type">
          <option value="task">任務</option>
          <option value="bug">錯誤</option>
          <option value="feature">功能</option>
          <option value="issue">問題</option>
        </select>
      </div>
      <div class="form-group"><label>標題</label><input type="text" id="item-title" placeholder="簡短描述任務內容"></div>
      <div class="form-group"><label>詳細說明</label><textarea id="item-desc" rows="4" placeholder="補充說明…"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>優先度</label>
          <select id="item-priority">
            <option value="highest">最高</option>
            <option value="high">高</option>
            <option value="medium" selected>中</option>
            <option value="low">低</option>
            <option value="lowest">最低</option>
          </select>
        </div>
        <div class="form-group">
          <label>狀態</label>
          <select id="item-status">
            <option value="todo">待處理</option>
            <option value="in_progress">進行中</option>
            <option value="testing">測試中</option>
            <option value="done">完成</option>
          </select>
        </div>
        <div class="form-group">
          <label>指派給</label>
          <select id="item-assignee"><option value="">未指派</option></select>
        </div>
        <div class="form-group">
          <label>協作成員</label>
          <select id="item-assignee2"><option value="">無</option></select>
        </div>
        <div class="form-group">
          <label>截止日期</label>
          <input type="date" id="item-due">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>進度（%）</label>
          <div style="display:flex;align-items:center;gap:10px">
            <input type="number" id="item-progress" min="0" max="100" step="5" value="0" style="width:80px;padding:8px 10px;border:2px solid #dfe1e6;border-radius:4px;font-size:14px" oninput="(function(v){var b=document.getElementById('item-progress-bar');if(b){var p=Math.min(100,Math.max(0,parseInt(v)||0));b.style.width=p+'%';b.style.background=p>=100?'#36b37e':p>=70?'#4c9aff':p>=30?'#ff8b00':'#de350b'}})(this.value)">
            <span style="color:#6b778c">%</span>
            <div style="flex:1;height:8px;background:#ebecf0;border-radius:4px;overflow:hidden">
              <div id="item-progress-bar" style="height:100%;width:0%;background:#4c9aff;border-radius:4px;transition:.2s"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-item')">取消</button>
      <button class="btn btn-primary" onclick="saveItem()">建立</button>
    </div>
  </div>
</div>

<!-- ===== ADD LINK MODAL ===== -->
<div class="modal-overlay" id="modal-link">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <h3>連結任務</h3>
      <button class="close-btn" onclick="closeModal('modal-link')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>連結類型</label>
        <select id="link-type">
          <option value="relates_to">相關於</option>
          <option value="blocks">阻擋</option>
          <option value="is_blocked_by">被阻擋</option>
          <option value="duplicates">重複</option>
          <option value="is_duplicated_by">被重複</option>
        </select>
      </div>
      <div class="form-group">
        <label>搜尋任務（輸入代號或關鍵字）</label>
        <input type="text" id="link-search" placeholder="例：FE-12 或關鍵字" oninput="searchLinkItems()">
      </div>
      <div id="link-search-results" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;display:none"></div>
      <input type="hidden" id="link-target-id">
      <div id="link-selected" style="margin-top:10px;font-size:13px;color:#0052cc"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-link')">取消</button>
      <button class="btn btn-primary" onclick="addLink()">新增連結</button>
    </div>
  </div>
</div>

<!-- ===== INVITE MEMBER MODAL ===== -->
<div class="modal-overlay" id="modal-invite">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <h3>邀請成員</h3>
      <button class="close-btn" onclick="closeModal('modal-invite')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>成員電子郵件</label>
        <input type="email" id="invite-email" placeholder="member@email.com">
        <div class="hint">成員需先自行在此系統註冊帳號，才能被加入專案。</div>
      </div>
      <div class="form-group">
        <label>角色</label>
        <select id="invite-role">
          <option value="member">成員</option>
          <option value="admin">管理員</option>
        </select>
      </div>
    </div>

// AUTH
// =============================================
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-error').style.display = 'none';
}

// 帳號名 → email 快取（登入後寫入，未登入時用）
function cacheNameEmail(name, email) {
  const c = JSON.parse(localStorage.getItem('pf_name_cache')||'{}');
  c[name] = email;
  localStorage.setItem('pf_name_cache', JSON.stringify(c));
}
function getCachedEmail(name) {
  return JSON.parse(localStorage.getItem('pf_name_cache')||'{}')[name] || null;
}

async function login() {
  const input = document.getElementById('login-name').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!input || !pass) return showAuthError('請填寫帳號和密碼');
  const isEmail = input.includes('@');
  try {
    let email;
    if (isEmail) {
      email = input;
    } else {
      email = getCachedEmail(input);
      if (!email) {
        try {
          const snap = await db.collection('users').where('name','==',input).limit(1).get();
          if (snap.empty) throw { code: 'auth/user-not-found' };
          email = snap.docs[0].data().email;
          cacheNameEmail(input, email);
        } catch(e) {
          if (e.code) throw e;
          showAuthError('查詢帳號失敗：請先用 Email 格式登入一次');
          return;
        }
      }
    }
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    showAuthError(translateAuthError(e.code));
  }
}

async function register() {
  const name  = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-password').value;
  if (!name||!email||!pass) return showAuthError('請填寫所有欄位');
  if (pass.length < 6) return showAuthError('密碼至少需要 6 個字元');
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await db.collection('users').doc(cred.user.uid).set({
      name, email, role: 'member', createdAt: FV.serverTimestamp()
    });
  } catch(e) {
    showAuthError(translateAuthError(e.code));
  }
}

async function logout() {
  S.unsubs.forEach(u=>u());
  S.unsubs = [];
  await auth.signOut();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function translateAuthError(code) {
  const map = {
    'auth/user-not-found'       : '帳號不存在',
    'auth/wrong-password'       : '密碼錯誤',
    'auth/invalid-credential'   : '帳號或密碼錯誤',
    'auth/invalid-login-credentials': '帳號或密碼錯誤',
    'auth/email-already-in-use' : '此 Email 已被使用',
    'auth/invalid-email'        : 'Email 格式不正確',
    'auth/weak-password'        : '密碼強度不足',
    'auth/too-many-requests'    : '嘗試次數過多，請稍後再試',
  };
  return map[code] || '帳號或密碼錯誤';
}

const ADMIN_EMAIL = 'admin@qualitycoe.com';
const ADMIN_PASS  = '1QAZWSX';

async function seedAdminAccount() {
  if (localStorage.getItem('pf_admin_seeded')) return;

}

// 先完成 admin seed，再啟動 auth 監聽，避免競爭條件
(async () => {
  await seedAdminAccount();
  auth.onAuthStateChanged(async user => {
    if (user) {
      S.user = user;
      await loadUserProfile();
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initApp();
    } else {
      S.user = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
})();

async function loadUserProfile() {
  const doc = await db.collection('users').doc(S.user.uid).get();
  if (doc.exists) {
    S.profile = { uid: S.user.uid, ...doc.data() };
  } else {
    const fallbackName = S.user.displayName || S.user.email.split('@')[0];
    S.profile = { uid: S.user.uid, name: fallbackName, email: S.user.email, role: 'member' };
    await db.collection('users').doc(S.user.uid).set(S.profile).catch(()=>{});
  }
  S.users[S.user.uid] = S.profile;
  // 登入成功後把帳號名→email 存入快取，下次登出後仍可查詢
  if (S.profile.name && S.user.email) {
    cacheNameEmail(S.profile.name, S.user.email);
  }
}

}

function initClock() {
  function tick() {
    const now = new Date();
    const d = now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',weekday:'short'});
    const t = now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    const el = document.getElementById('topbar-clock');
    if (el) el.textContent = d + ' ' + t;
  }
  tick();
  setInterval(tick, 1000);
}

// =============================================
// CALENDAR POPUP
// =============================================
const calState = { year: new Date().getFullYear(), month: new Date().getMonth() };

function toggleCalendar() {
  const popup = document.getElementById('calendar-popup');
  if (!popup) return;
  if (popup.style.display !== 'none') { popup.style.display = 'none'; return; }
  const now = new Date();
  calState.year = now.getFullYear();
  calState.month = now.getMonth();
  renderCalendarPopup();
  popup.style.display = 'block';
}

function renderCalendarPopup() {
  const { year, month } = calState;
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const dayNames = ['日','一','二','三','四','五','六'];
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const isCurMonth = today.getFullYear()===year && today.getMonth()===month;

  let cells = '';
  for (let i = 0; i < firstDay; i++) cells += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = isCurMonth && today.getDate()===d;
    cells += `<div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;${isToday?'background:#0052cc;color:#fff;font-weight:700;':'color:var(--txt);'}">${d}</div>`;
  }

  document.getElementById('cal-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px">
      <button onclick="calNav(-1)" style="background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;color:var(--txt2);display:flex;align-items:center;justify-content:center;flex-shrink:0">‹</button>
      <span style="font-weight:700;font-size:14px;color:var(--txt);white-space:nowrap">${year}年 ${monthNames[month]}</span>
      <button onclick="calNav(1)" style="background:none;border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;color:var(--txt2);display:flex;align-items:center;justify-content:center;flex-shrink:0">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,30px);gap:2px;margin-bottom:4px">
      ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:600;color:var(--txt2);height:22px;display:flex;align-items:center;justify-content:center">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,30px);gap:2px">
      ${cells}
    </div>`;
}

function calNav(dir) {
  calState.month += dir;
  if (calState.month > 11) { calState.month = 0; calState.year++; }
  if (calState.month < 0)  { calState.month = 11; calState.year--; }
  renderCalendarPopup();
}

document.addEventListener('click', function(e) {
  const popup = document.getElementById('calendar-popup');
  const wrap = document.getElementById('cal-wrap');
  if (popup && wrap && popup.style.display !== 'none') {
    // composedPath captures the original path before any DOM mutation (e.g., calNav re-render)
    const path = e.composedPath ? e.composedPath() : [];
    if (!path.includes(wrap) && !wrap.contains(e.target)) {
      popup.style.display = 'none';
    }
  }
});

function initTheme() {
  const saved = localStorage.getItem('pf_theme') || 'light';
  applyTheme(saved);
}

function toggleTheme() {
  const current = document.body.getAttribute('data-theme') || 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
  localStorage.setItem('pf_theme', document.body.getAttribute('data-theme'));
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.body.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️ 淺色' : '🌙 深色';
}

// =============================================
// SUBSCRIPTIONS
// =============================================
function subscribeProjects() {
  // 管理員看所有專案，一般成員只看自己參與的
  const isAdmin = S.profile?.role === 'admin';
  const query = isAdmin
    ? db.collection('projects')
    : db.collection('projects').where('members', 'array-contains', S.user.uid);

  const unsub = query.onSnapshot(snap => {
    S.projects = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
    renderSidebarProjects();
    if (S.currentProject) {
      const updated = S.projects.find(p=>p.id===S.currentProject.id);
      if (updated) S.currentProject = updated;
    }
    if (document.getElementById('content').dataset.view === 'home') renderHome();
    if (document.getElementById('content').dataset.view === 'projects') renderProjectsList();
  });
  S.unsubs.push(unsub);
}

function subscribeProjectItems(projectId) {
  S.unsubs.filter(u=>u._isItemSub).forEach(u=>u());
  const unsub = db.collection('items')
    .where('projectId', '==', projectId)
    .onSnapshot(snap => {
      S.items = snap.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
      S.allItems = [...S.allItems.filter(i=>i.projectId!==projectId), ...S.items];
      renderProjectContent();
      if (S.panelItem) {
        const updated = S.items.find(i=>i.id===S.panelItem.id);
        if (updated) { S.panelItem = updated; renderPanel(); }
      }
    });
  unsub._isItemSub = true;
  S.unsubs.push(unsub);
}

function subscribeMyItems() {
  let _pool1 = [], _pool2 = [];
  const mergeMyItems = () => {
    const map = {};
    [..._pool1, ..._pool2].forEach(i => { map[i.id] = i; });
    S.myItems = Object.values(map)
      .sort((a,b)=>((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)));
    S.myItems.forEach(item => {
      const idx = S.allItems.findIndex(i=>i.id===item.id);
      if (idx === -1) S.allItems.push(item);
      else S.allItems[idx] = item;
    });
    updateMyWorkBadge();
    if (document.getElementById('content').dataset.view === 'mywork') renderMyWork();
  };
  const u1 = db.collection('items')
    .where('assignee', '==', S.user.uid)
    .onSnapshot(snap => { _pool1 = snap.docs.map(d=>({id:d.id,...d.data()})); mergeMyItems(); });
  const u2 = db.collection('items')
    .where('assignee2', '==', S.user.uid)
    .onSnapshot(snap => { _pool2 = snap.docs.map(d=>({id:d.id,...d.data()})); mergeMyItems(); });
  S.unsubs.push(u1, u2);
}

function activeProjectIdSet() {
  return new Set(S.projects.filter(p=>!p.archived).map(p=>p.id));
}

function updateMyWorkBadge() {
  const active = activeProjectIdSet();
  const count = S.myItems.filter(i=>active.has(i.projectId)&&i.status!=='done').length;
  const badge = document.getElementById('mywork-badge');
  if (!badge) return;
  if (count > 0) { badge.textContent = count; badge.style.display = ''; }
  else { badge.style.display = 'none'; }
}

function renderMyWork() {
  const content = document.getElementById('content');
  content.dataset.view = 'mywork';
  const active = activeProjectIdSet();
  const items = S.myItems.filter(i=>active.has(i.projectId));
  const undoneCount = items.filter(i=>i.status!=='done').length;
  setTopbar(`我的工作`);

  if (!items.length) {
    content.innerHTML = '<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">✅</div><p>目前沒有指派給你的工作</p></div>';
    return;
  }

  // group by project
  const byProject = {};
  items.forEach(i => {
    if (!byProject[i.projectId]) byProject[i.projectId] = [];
    byProject[i.projectId].push(i);
  });

  const statusOrder = { in_progress:0, testing:1, todo:2, done:3 };
  const itemRows = (pItems) => pItems
    .sort((a,b)=>(statusOrder[a.status]??9)-(statusOrder[b.status]??9))
    .map(i=>`<tr onclick="openItemPanel('${i.id}')" style="${i.status==='done'?'opacity:.55':''}">
      <td style="text-align:center">${typeIcon(i.type)}</td>
      <td style="color:var(--accent);font-weight:600;white-space:nowrap">${esc(i.key)}</td>
      <td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.title)}</td>
      <td>${statusBadge(i.status)}</td>
      <td>${priorityBadge(i.priority)}</td>
      <td style="color:${dueDateColor(i.dueDate)};white-space:nowrap">${formatDate(i.dueDate)||'—'}</td>
    </tr>`).join('');

  const projectSections = Object.entries(byProject).map(([pid, pItems]) => {
    const proj = S.projects.find(p=>p.id===pid);
    const projName = proj?.name || '未知專案';
    const projColor = proj?.color || '#0052cc';
    const undone = pItems.filter(i=>i.status!=='done').length;
    return `<tr><td colspan="6" style="padding:16px 14px 6px;background:var(--bg);border-bottom:2px solid var(--border);font-weight:600;font-size:14px">
        <span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${projColor};margin-right:7px;vertical-align:middle"></span>${esc(projName)}<span style="font-size:13px;font-weight:400;color:var(--txt2);margin-left:8px">${undone} 項進行中</span>
      </td></tr>${itemRows(pItems)}`;
  }).join('');

  content.innerHTML = `
    <div class="list-wrap">
      <table class="list-table" style="table-layout:fixed;width:100%">
        <colgroup>
          <col style="width:36px"><col style="width:88px"><col><col style="width:152px"><col style="width:90px"><col style="width:90px">
        </colgroup>
        <thead><tr>
          <th></th><th>代號</th><th>標題</th><th>狀態</th><th>優先度</th><th>截止日期</th>
        </tr></thead>
        <tbody>${projectSections}</tbody>
      </table>
    </div>`;
}

async function renderMemberLoad() {
  setTopbar('成員負載');
  const content = document.getElementById('content');
  content.dataset.view = 'memberload';
  content.innerHTML = '<div class="empty-state"><p>載入中…</p></div>';

  // Fetch all users so non-admin members see everyone's data
  try {
    const usersSnap = await db.collection('users').get();
    usersSnap.docs.forEach(d => { S.users[d.id] = { uid:d.id, ...d.data() }; });
  } catch(e) { /* use cached S.users */ }

  // Fetch all items (all members can read items; fallback to S.allItems if rules restrict)
  let allItems = [];
  try {
    const snap = await db.collection('items').get();
    allItems = snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e) {
    allItems = [...S.allItems];
  }
  // Exclude items from archived projects
  const archivedIds = new Set(S.projects.filter(p=>p.archived).map(p=>p.id));
  allItems = allItems.filter(i => !archivedIds.has(i.projectId));

  const users = Object.values(S.users).filter(u=>u.uid);
  if (!users.length) {
    content.innerHTML = '<div class="empty-state"><p>尚無成員資料</p></div>';
    return;
  }

  const statusOrder = {in_progress:0,testing:1,todo:2,done:3};
  const stats = users.map(u => {
    const mine = allItems.filter(i => i.assignee===u.uid || i.assignee2===u.uid);
    const done     = mine.filter(i=>i.status==='done').length;
    const inProg   = mine.filter(i=>i.status==='in_progress').length;
    const testing  = mine.filter(i=>i.status==='testing').length;
    const todo     = mine.filter(i=>i.status==='todo').length;
    const total    = mine.length;
    const donePct  = total ? Math.round(done/total*100) : 0;
    const avgProg  = total ? Math.round(mine.reduce((s,i)=>s+(i.progress||0),0)/total) : 0;
    const undone   = mine.filter(i=>i.status!=='done');
    return { u, total, done, inProg, testing, todo, donePct, avgProg, undone };
  }).sort((a,b) => b.total - a.total || a.u.name?.localeCompare(b.u.name));

  const teamTotal  = allItems.length;
  const teamDone   = allItems.filter(i=>i.status==='done').length;
  const teamPct    = teamTotal ? Math.round(teamDone/teamTotal*100) : 0;
  const teamAvgP   = teamTotal ? Math.round(allItems.reduce((s,i)=>s+(i.progress||0),0)/teamTotal) : 0;

  const bar = (pct, color) =>
    `<div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px">
       <div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:.4s"></div>
     </div>`;

  content.innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div style="background:var(--white);border-radius:8px;padding:14px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;min-width:220px">
        <div style="font-size:28px;font-weight:800;color:var(--accent)">${teamPct}%</div>
        <div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:3px">整體團隊完成度</div>
          ${bar(teamPct,'#36b37e')}
          <div style="font-size:11px;color:var(--txt2);margin-top:3px">${teamDone} / ${teamTotal} 項已完成</div>
        </div>
      </div>
      <div style="background:var(--white);border-radius:8px;padding:14px 20px;box-shadow:var(--shadow);min-width:160px">
        <div style="font-size:28px;font-weight:800;color:var(--accent)">${teamAvgP}%</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">平均任務進度</div>
      </div>
      <div style="background:var(--white);border-radius:8px;padding:14px 20px;box-shadow:var(--shadow);min-width:160px">
        <div style="font-size:28px;font-weight:800;color:var(--accent)">${users.length}</div>
        <div style="font-size:12px;color:var(--txt2);margin-top:2px">成員總數</div>
      </div>
    </div>

    <div class="list-wrap">
      <table class="list-table" style="table-layout:fixed;width:100%">
        <colgroup>
          <col style="width:180px"><col style="width:68px"><col style="width:68px"><col style="width:68px"><col style="width:68px"><col style="width:68px"><col><col style="width:72px">
        </colgroup>
        <thead><tr>
          <th>成員</th>
          <th style="text-align:center">總計</th>
          <th style="text-align:center;color:#0052cc">進行中</th>
          <th style="text-align:center;color:#974f0c">測試中</th>
          <th style="text-align:center;color:#42526e">待處理</th>
          <th style="text-align:center;color:#006644">已完成</th>
          <th>整體進度</th>
          <th style="text-align:right">完成率</th>
        </tr></thead>
        <tbody>
          ${stats.map(({u,total,done,inProg,testing,todo,donePct,avgProg,undone})=>`
          <tr onclick="showMemberItems('${u.uid}')" style="cursor:pointer">
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="user-avatar" style="width:32px;height:32px;font-size:13px;background:${avatarColor(u.name)};flex-shrink:0">${initials(u.name)}</div>
                <div>
                  <div style="font-weight:600;font-size:14px">${esc(u.name)}</div>
                  <div style="font-size:11px;color:var(--txt2)">${esc(u.email||'')}</div>
                </div>
              </div>
            </td>
            <td style="text-align:center;font-weight:700;font-size:16px">${total}</td>
            <td style="text-align:center"><span style="font-weight:600;color:${inProg?'#0052cc':'var(--txt2)'}">${inProg}</span></td>
            <td style="text-align:center"><span style="font-weight:600;color:${testing?'#974f0c':'var(--txt2)'}">${testing}</span></td>
            <td style="text-align:center"><span style="font-weight:600;color:${todo?'#42526e':'var(--txt2)'}">${todo}</span></td>
            <td style="text-align:center"><span style="font-weight:600;color:${done?'#006644':'var(--txt2)'}">${done}</span></td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                ${bar(avgProg, progressColor(avgProg))}
                <span style="font-size:12px;color:${progressColor(avgProg)};font-weight:600;width:36px;text-align:right">${avgProg}%</span>
              </div>
            </td>
            <td style="text-align:right;font-weight:700;color:${progressColor(donePct)}">${donePct}%</td>
          </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div id="member-items-panel" style="display:none;margin-top:20px"></div>`;
}

function showMemberItems(uid) {
  const panel = document.getElementById('member-items-panel');
  if (!panel) return;
  const u = S.users[uid];
  const items = S.allItems.filter(i=>i.assignee===uid||i.assignee2===uid);
  if (!items.length) { panel.style.display='none'; return; }
  const statusOrder = {in_progress:0,testing:1,todo:2,done:3};
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="section-header">
      <h2 style="display:flex;align-items:center;gap:8px">
        <div class="user-avatar" style="width:24px;height:24px;font-size:11px;background:${avatarColor(u?.name||'')}">
          ${initials(u?.name||'?')}</div>

      </h2>
    </div>

      <table class="list-table" style="table-layout:fixed;width:100%">

}

function showView(view, projectId) {
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+view);
  if (navEl) navEl.classList.add('active');

  const content = document.getElementById('content');
  content.dataset.view = view;

  if (view === 'home')       { renderHome(); setTopbar('首頁'); }
  if (view === 'projects')   { renderProjectsList(); setTopbar('所有專案'); }
  if (view === 'mywork')     { renderMyWork(); }
  if (view === 'memberload') { renderMemberLoad(); }
  if (view === 'admin')      { renderAdmin(); setTopbar('管理員面板'); }
  if (view === 'project')    { openProject(projectId); }
}

function setTopbar(title, actions='') {
  document.getElementById('topbar-title').innerHTML = title;
  document.getElementById('topbar-actions').innerHTML = actions;
}

async function renderHome() {
  // On first call after projects load, fetch all items so home-page counts are accurate
  if (!S.allItemsLoaded && S.projects.length) {
    S.allItemsLoaded = true;
    try {
      const snap = await db.collection('items').get();
      snap.docs.forEach(d => {
        const item = {id:d.id,...d.data()};
        const idx = S.allItems.findIndex(i=>i.id===item.id);
        if (idx === -1) S.allItems.push(item);
        else S.allItems[idx] = item;
      });
    } catch(e) {}
  }
  if (document.getElementById('content')?.dataset.view !== 'home') return;
  const myItems = S.items.filter(i=>(i.assignee===S.user.uid||i.assignee2===S.user.uid) && i.status!=='done').slice(0,8);

  document.getElementById('content').innerHTML = `

    <div class="home-grid">
      ${recentProjects.map(p=>`

              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();archiveProject('${p.id}')" title="封存">📦</button>
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();deleteProject('${p.id}')" title="刪除">🗑</button>

          </div>
          <p>${esc(p.description||'')}</p>
          <div class="project-stats">

            <div class="stat"><div class="stat-num">${countStatus(p.id,'in_progress')}</div><div class="stat-lbl">進行中</div></div>
            <div class="stat"><div class="stat-num">${countStatus(p.id,'testing')}</div><div class="stat-lbl">測試中</div></div>
            <div class="stat"><div class="stat-num">${countStatus(p.id,'done')}</div><div class="stat-lbl">完成</div></div>
          </div>
          ${(()=>{const pct=projectProgress(p.id);return `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:13px;color:#6b778c;margin-bottom:3px"><span>${t('整體進度')}</span><span>${pct}%</span></div><div style="background:#dfe1e6;border-radius:4px;height:5px"><div style="width:${pct}%;height:5px;border-radius:4px;background:${progressColor(pct)};transition:width .3s"></div></div></div>`})()}
        </div>`).join('')}
      <div class="project-card project-card-add" style="border-top-color:#dfe1e6;background:#f4f5f7;display:flex;align-items:center;justify-content:center;min-height:120px" onclick="openCreateProjectModal()">

    </div>`:''}`;
  document.getElementById('content').dataset.view='home';
}

function countStatus(projectId, status) {
  return S.allItems.filter(i=>i.projectId===projectId&&i.status===status).length;
}
function projectProgress(projectId) {
  const items = S.allItems.filter(i=>i.projectId===projectId);
  if (!items.length) return 0;
  return Math.round(items.reduce((s,i)=>s+(i.progress||0),0)/items.length);
}

async function openProject(projectId) {
  S.currentProject = S.projects.find(p=>p.id===projectId);
  if (!S.currentProject) {
    const doc = await db.collection('projects').doc(projectId).get();
    if (doc.exists) S.currentProject = { id:doc.id, ...doc.data() };
  }
  subscribeProjectItems(projectId);
  document.getElementById('content').dataset.view='project';

  // mark sidebar active
  document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
  const sideEl = document.querySelector(`.sidebar-item[data-pid="${projectId}"]`);
  if (sideEl) sideEl.classList.add('active');

  renderProjectTopbar();
}

function renderProjectTopbar() {
  const p = S.currentProject;
  if (!p) return;
  const isAdmin = S.profile?.role==='admin' || p.createdBy===S.user.uid;
  setTopbar(
    `<span style="background:${p.color||'#0052cc'};color:#fff;padding:3px 8px;border-radius:4px;font-size:13px">${esc(p.key)}</span> ${esc(p.name)}`,
    `<div class="view-tabs">
      <div class="view-tab ${S.projectView==='board'?'active':''}" onclick="switchProjectView('board')">Board</div>
      <div class="view-tab ${S.projectView==='list'?'active':''}" onclick="switchProjectView('list')">List</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openCreateItemModal()">+ 建立</button>
    <button class="btn btn-secondary btn-sm" onclick="exportProjectXlsx()">↓ 匯出</button>
    <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-xlsx-input').click()">↑ 匯入</button>
    <input type="file" id="import-xlsx-input" accept=".xlsx" style="display:none" onchange="handleImportXlsx(this)">
    <button class="btn btn-secondary btn-sm" onclick="openProjectMembers()">👥 成員（${(p.members||[]).length}）</button>
    ${isAdmin?`<button class="btn btn-secondary btn-sm" onclick="openEditProject('${p.id}')">✏️ 編輯</button>`:''}
    ${isAdmin?(p.archived

function t(str) {
  const {p,s} = LANG;
  const primary = p==='zh' ? str : (TRANS[p]?.[str]||str);
  if (!s || s===p) return primary;
  const sec = s==='zh' ? str : (TRANS[s]?.[str]||'');
  if (!sec||sec===primary) return primary;
  return `${primary}<span class="lang-sec">${sec}</span>`;
}
function tPlain(str) { return t(str).replace(/<[^>]+>/g,''); }
function saveLang() { localStorage.setItem('pf_lang',JSON.stringify(LANG)); }
function applyLangChange() {
  const p = document.querySelector('input[name="lang-p"]:checked')?.value||'zh';

function toggleLangPicker() {

function renderBoard() {
  const content = document.getElementById('content');

function isOverdue(item) {
  if (!item.dueDate || item.status === 'done') return false;
  const today = new Date(); today.setHours(0,0,0,0);
  return new Date(item.dueDate + 'T00:00:00') < today;
}

function progressColor(pct) {
  if (pct >= 100) return '#36b37e';
  if (pct >= 70)  return '#4c9aff';
  if (pct >= 30)  return '#ff8b00';
  return '#de350b';
}

function boardCard(item) {
  const assignee = S.users[item.assignee];
  const assignee2 = S.users[item.assignee2];
  const pct = Math.min(100, Math.max(0, item.progress || 0));
  const overdue = isOverdue(item);
  return `<div class="board-card${overdue?' card-overdue':''}" draggable="true" data-id="${item.id}" ondragstart="dragItem(event,'${item.id}')" onclick="openItemPanel('${item.id}')" style="border-left-color:${priorityColor(item.priority)}">
    <div class="board-card-key">${typeIcon(item.type)} <span style="color:#0052cc">${esc(item.key)}</span></div>
    <div class="board-card-title">${esc(item.title)}</div>
    <div class="board-card-footer">
      ${priorityBadge(item.priority)}
      <div style="display:flex;align-items:center;gap:4px">
        ${item.dueDate?`<span style="font-size:11px;color:${dueDateColor(item.dueDate)}">${formatDate(item.dueDate)}</span>`:''}
        ${assignee?`<div class="user-avatar" style="width:22px;height:22px;font-size:10px;background:${avatarColor(assignee.name)}" title="${esc(assignee.name)}">${initials(assignee.name)}</div>`:''}
        ${assignee2?`<div class="user-avatar" style="width:22px;height:22px;font-size:10px;background:${avatarColor(assignee2.name)}" title="${esc(assignee2.name)}">${initials(assignee2.name)}</div>`:''}
      </div>
    </div>
    <div style="margin-top:8px">
      <div style="height:4px;background:#ebecf0;border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${progressColor(pct)};border-radius:2px;transition:.3s"></div>
      </div>
      <div style="text-align:right;font-size:11px;color:${progressColor(pct)};font-weight:600;margin-top:2px">${pct}%</div>
    </div>
  </div>`;
}

let draggedId = null;
function dragItem(ev, id) { draggedId=id; ev.dataTransfer.effectAllowed='move'; }
async function dropItem(ev, newStatus) {
  ev.preventDefault();
  document.querySelectorAll('.board-col').forEach(c=>c.classList.remove('drag-over'));
  if (!draggedId) return;
  const updates = { status: newStatus, updatedAt: FV.serverTimestamp() };
  if (newStatus === 'done') updates.progress = 100;
  await db.collection('items').doc(draggedId).update(updates);
  draggedId = null;
}

let listSort = { field:'createdAt', dir:-1 };

function renderList() {
  const sorted = [...S.items].sort((a,b)=>{
    let av = a[listSort.field], bv = b[listSort.field];
    if (av?.seconds) av=av.seconds;
    if (bv?.seconds) bv=bv.seconds;
    if (av<bv) return -listSort.dir;
    if (av>bv) return listSort.dir;
    return 0;
  });

  const arrow = dir => dir>0?'▲':'▼';
  const th = (f,label) => `<th onclick="sortList('${f}')" style="cursor:pointer">${label}${listSort.field===f?' '+arrow(listSort.dir):''}</th>`;

  document.getElementById('content').innerHTML = `
    <div class="list-wrap">
      <div class="list-toolbar">
        <span style="font-size:13px;color:#6b778c">${S.items.length} 項目</span>
        <select onchange="filterByStatus(this.value)" style="margin-left:auto;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px">
          <option value="">所有狀態</option>
          <option value="todo">待處理</option>
          <option value="in_progress">進行中</option>
          <option value="testing">測試中</option>
          <option value="done">完成</option>
        </select>
      </div>
      <table class="list-table">
        <thead><tr>
          <th>類型</th>
          ${th('key','代號')}
          ${th('title','標題')}
          ${th('status','狀態')}
          ${th('priority','優先度')}
          ${th('progress','進度')}
          <th>指派</th>
          ${th('dueDate','截止')}
          ${th('createdAt','建立')}
          <th>回報者</th>
        </tr></thead>
        <tbody>
          ${sorted.map(i=>{
            const pct = Math.min(100,Math.max(0,i.progress||0));
            const pc = progressColor(pct);
            const overdue = isOverdue(i);
            return `<tr onclick="openItemPanel('${i.id}')" class="${overdue?'row-overdue':''}">
            <td>${typeCell(i.type)}</td>
            <td style="color:#0052cc;font-weight:500;white-space:nowrap">${esc(i.key)}</td>
            <td style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.title)}</td>
            <td>${statusBadge(i.status)}</td>
            <td>${priorityBadge(i.priority)}</td>
            <td style="min-width:110px">
              <div style="display:flex;align-items:center;gap:6px">
                <div style="flex:1;height:5px;background:#ebecf0;border-radius:3px;overflow:hidden">
                  <div style="height:100%;width:${pct}%;background:${pc};border-radius:3px"></div>
                </div>
                <span style="font-size:12px;color:${pc};font-weight:600;white-space:nowrap">${pct}%</span>
              </div>
            </td>
            <td><div style="display:flex;gap:4px;flex-wrap:wrap">${userChip(i.assignee)}${i.assignee2?userChip(i.assignee2):''}</div></td>
            <td style="white-space:nowrap;color:${dueDateColor(i.dueDate)}">${formatDate(i.dueDate)||'—'}</td>
            <td style="white-space:nowrap;color:#6b778c;font-size:12px">${formatTs(i.createdAt)}</td>
            <td>${userChip(i.reporter)}</td>
          </tr>`;}).join('')}
        </tbody>
      </table>
      ${!S.items.length?'<div class="empty-state"><p>此專案尚無任務，點擊右上角「+ 建立」開始新增</p></div>':''}
    </div>`;
}

let _listFilter = '';
function filterByStatus(status) {
  _listFilter = status;
  if (!status) { renderList(); return; }
  const orig = S.items;
  S.items = orig.filter(i=>i.status===status);
  renderList();
  S.items = orig;
}

function sortList(field) {
  if (listSort.field===field) listSort.dir *= -1;
  else { listSort.field=field; listSort.dir=-1; }
  renderList();
}

async function openItemPanel(itemId) {
  let item = S.items.find(i=>i.id===itemId) || S.allItems.find(i=>i.id===itemId);
  if (!item) {
    const doc = await db.collection('items').doc(itemId).get();
    if (!doc.exists) return;
    item = { id:doc.id, ...doc.data() };
  }
  S.panelItem = item;

  // load users in item's project
  await loadProjectUsers(item.projectId);

  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('item-panel').classList.add('open');
  renderPanel();
}

async function renderPanel() {
  const item = S.panelItem;
  if (!item) return;
  document.getElementById('panel-key').innerHTML = `${typeIcon(item.type)} <span style="color:#0052cc;font-weight:600">${esc(item.key)}</span>`;

  const proj = S.projects.find(p=>p.id===item.projectId) || { name:'', key:'' };
  const projectUsers = await getProjectUsersOptions(item.projectId);

  // load reporter profile if not already cached
  if (item.reporter && !S.users[item.reporter]) {
    const rDoc = await db.collection('users').doc(item.reporter).get();
    if (rDoc.exists) S.users[item.reporter] = { uid: item.reporter, ...rDoc.data() };
  }

  // load comments
  const commSnap = await db.collection('comments').where('itemId','==',item.id).get();
  const comments = commSnap.docs.map(d=>({id:d.id,...d.data()}))
    .sort((a,b) => {
      if (!!a.deleted !== !!b.deleted) return a.deleted ? 1 : -1;
      return (a.createdAt?.seconds||0) - (b.createdAt?.seconds||0);

  const links = item.links || [];

    if (other.id === item.id) return [];

  const allLinks = [...links.map(l=>({...l, isReverse:false})), ...reverseLinks];
  const linkHtml = allLinks.length ? allLinks.map(l=>`

          <div class="meta-label">${t('狀態')}</div>
