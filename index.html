        return `<div class="comment-item" id="ci-${c.id}">
          <div class="user-avatar" style="width:28px;height:28px;font-size:11px;background:${avatarColor(getUserName(c.authorId))};flex-shrink:0">${initials(getUserName(c.authorId))}</div>
          <div class="comment-content" style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
              <span class="comment-author">${esc(getUserName(c.authorId))}</span>
              <span class="comment-time">${formatTs(c.createdAt)}</span>
              ${c.editedAt?`<span class="comment-time">${t('已編輯')}</span>`:''}
              ${canEdit||canDelete?`<div class="comment-actions">
                ${canEdit?`<button class="btn btn-ghost btn-sm" onclick="startEditComment('${c.id}')" title="編輯">✏️</button>`:''}
                ${canDelete?`<button class="btn btn-ghost btn-sm" onclick="deleteComment('${c.id}')" title="刪除">🗑</button>`:''}
              </div>`:''}
            </div>
            <div id="comment-text-${c.id}" class="comment-text">${esc(c.content)}</div>
            <div id="comment-edit-wrap-${c.id}" class="comment-edit-wrap">
              <textarea id="comment-edit-inp-${c.id}" rows="3">${esc(c.content)}</textarea>
              <div style="display:flex;gap:6px;margin-top:6px">
                <button class="btn btn-primary btn-sm" onclick="saveEditComment('${c.id}')">儲存</button>
                <button class="btn btn-secondary btn-sm" onclick="cancelEditComment('${c.id}')">取消</button>
              </div>
            </div>
            ${edits.length?`<div class="changelog">
              <div class="changelog-title">${t('修改記錄')}</div>
              ${edits.map(e=>`<div class="changelog-entry"><span style="margin-right:8px;font-style:italic">${fmtEditedAt(e.editedAt)}</span>${esc(e.content)}</div>`).join('')}
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
      <div class="comment-input-wrap" style="margin-top:12px">
        <div class="user-avatar" style="width:28px;height:28px;font-size:11px;background:${avatarColor(S.profile?.name||'')};flex-shrink:0">${initials(S.profile?.name||'')}</div>
        <div style="flex:1;min-width:0">
          <textarea id="comment-input" placeholder="${tPlain('新增留言…')}" rows="3" style="width:100%"></textarea>
          <div style="margin-top:6px">
            <button class="btn btn-primary btn-sm" onclick="addComment()">${t('留言')}</button>
          </div>
        </div>
      </div>
    </div>`;
}

function closeItemPanel() {
  document.getElementById('item-panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
  S.panelItem = null;
}

function editDesc() {
  const el = document.getElementById('panel-desc');
  const actions = document.getElementById('panel-desc-actions');
  if (!el.isContentEditable || el.contentEditable==='false') {
    el.contentEditable = 'true';
    el.classList.add('editing');
    el.focus();
    if (actions) actions.style.display='flex';
    S._origDesc = el.textContent;
  }
}
function saveDesc() {
  const el = document.getElementById('panel-desc');
  const val = el.textContent.trim();
  el.contentEditable='false';
  el.classList.remove('editing');
  document.getElementById('panel-desc-actions').style.display='none';
  savePanelField('description', val==='（點擊新增說明）'?'':val);
}
function cancelDesc() {
  const el = document.getElementById('panel-desc');
  el.textContent = S._origDesc || '';
  el.contentEditable='false';
  el.classList.remove('editing');
  document.getElementById('panel-desc-actions').style.display='none';
}

async function savePanelField(field, value) {
  if (!S.panelItem) return;
  if (field === 'progress') value = Math.min(100, Math.max(0, parseInt(value)||0));
  const updates = { [field]: value, updatedAt: FV.serverTimestamp() };
  if (field === 'status' && value === 'done') {
    updates.progress = 100;
    S.panelItem.progress = 100;
  }
  if (field === 'progress' && value === 100 && S.panelItem.status !== 'done') {
    updates.status = 'done';
    S.panelItem.status = 'done';
  }
  await db.collection('items').doc(S.panelItem.id).update(updates);
  S.panelItem[field] = value;
  renderPanel();
  toast('已更新', 'success');
}

async function deleteCurrentItem() {
  if (!S.panelItem) return;
  if (!confirm(`確定要刪除 ${S.panelItem.key}？`)) return;
  await db.collection('items').doc(S.panelItem.id).delete();
  closeItemPanel();
  toast('已刪除', 'success');
}

async function addComment() {
  const input = document.getElementById('comment-input');
  const content = input.value.trim();
  if (!content || !S.panelItem) return;
  await db.collection('comments').add({
    itemId: S.panelItem.id,
    content,
    authorId: S.user.uid,
    createdAt: FV.serverTimestamp()
  });
  input.value = '';
  renderPanel();
}
function startEditComment(id) {
  document.getElementById(`comment-text-${id}`).style.display = 'none';
  document.getElementById(`comment-edit-wrap-${id}`).style.display = 'block';
  document.getElementById(`comment-edit-inp-${id}`).focus();
}
function cancelEditComment(id) {
  document.getElementById(`comment-text-${id}`).style.display = '';
  document.getElementById(`comment-edit-wrap-${id}`).style.display = 'none';
}
async function saveEditComment(id) {
  const inp = document.getElementById(`comment-edit-inp-${id}`);
  const newContent = inp?.value.trim();
  if (!newContent) return;
  const snap = await db.collection('comments').doc(id).get();
  const old = snap.data()?.content || '';
  const now = new Date().toISOString();
  await db.collection('comments').doc(id).update({
    content: newContent,
    editedAt: now,
    edits: FV.arrayUnion({ content: old, editedAt: now })
  });
  renderPanel();
}
async function deleteComment(id) {
  if (!confirm(tPlain('確定要刪除這則留言？'))) return;
  const snap = await db.collection('comments').doc(id).get();
  const old = snap.data()?.content || '';
  const now = new Date().toISOString();
  await db.collection('comments').doc(id).update({
    deleted: true,
    deletedAt: now,
    deletedBy: S.user.uid,
    edits: FV.arrayUnion({ content: old, editedAt: now, action: 'deleted' })
  });
  renderPanel();
}

    document.getElementById('item-assignee').innerHTML = '<option value="">未指派</option>' + opts;

async function saveItem() {
  const title = document.getElementById('item-title').value.trim();
  if (!title) { toast('請填寫標題', 'error'); return; }
  if (!S.currentProject) { toast('請先選擇專案', 'error'); return; }

  const projRef = db.collection('projects').doc(S.currentProject.id);
  let itemKey;

  await db.runTransaction(async tx => {
    const projDoc = await tx.get(projRef);
    const counter = (projDoc.data().counter||0) + 1;
    itemKey = `${S.currentProject.key}-${String(counter).padStart(3,'0')}`;
    tx.update(projRef, { counter });
    tx.set(db.collection('items').doc(), {
      projectId: S.currentProject.id,
      key: itemKey,
      type: document.getElementById('item-type').value,
      title,
      description: document.getElementById('item-desc').value.trim(),
      status: document.getElementById('item-status').value,
      priority: document.getElementById('item-priority').value,
      assignee: document.getElementById('item-assignee').value,
      assignee2: document.getElementById('item-assignee2').value,
      reporter: S.user.uid,
      dueDate: document.getElementById('item-due').value,
      progress: Math.min(100, Math.max(0, parseInt(document.getElementById('item-progress').value)||0)),
      links: [],
      createdAt: FV.serverTimestamp(),
      updatedAt: FV.serverTimestamp()
    });
  });

  closeModal('modal-item');
  toast(`已建立 ${itemKey}`, 'success');
}

function openLinkModal() {
  S.linkTarget = null;
  document.getElementById('link-search').value='';

  document.getElementById('link-selected').textContent='';
  document.getElementById('link-search-results').style.display='none';
  openModal('modal-link');
}

function searchLinkItems() {
  const q = document.getElementById('link-search').value.toLowerCase();
  const results = document.getElementById('link-search-results');
  if (!q) { results.style.display='none'; return; }
  const matches = S.allItems.filter(i=>
    i.id !== S.panelItem?.id &&
    (i.key.toLowerCase().includes(q) || i.title.toLowerCase().includes(q))
  ).slice(0,10);
  if (!matches.length) { results.innerHTML='<div style="padding:10px;color:var(--txt2);font-size:13px">無結果</div>'; results.style.display='block'; return; }
  results.innerHTML = matches.map(i=>`
    <div onclick="selectLinkTarget('${i.id}')" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">
      ${typeIcon(i.type)} <span style="color:var(--accent);font-weight:500">${esc(i.key)}</span> ${esc(i.title)}
    </div>`).join('');
  results.style.display='block';
}

function selectLinkTarget(id) {
  const item = S.allItems.find(i=>i.id===id);
  if (!item) return;
  S.linkTarget = item;
  document.getElementById('link-target-id').value = id;
  document.getElementById('link-selected').innerHTML=`已選擇：<strong>${esc(item.key)}</strong> ${esc(item.title)}`;
  document.getElementById('link-search-results').style.display='none';
  document.getElementById('link-search').value = item.key + ' ' + item.title;
}

async function addLink() {
  const targetId = S.linkTarget?.id || document.getElementById('link-target-id').value;
  const linkType = document.getElementById('link-type').value;
  if (!targetId || !S.panelItem) { toast('請先選擇要連結的任務', 'error'); return; }

  const target = S.allItems.find(i=>i.id===targetId);
  if (!target) return;

  const existing = (S.panelItem.links||[]);
  if (existing.find(l=>l.targetId===targetId)) { toast('已連結此項目', 'error'); return; }

  const newLinks = [...existing, { type:linkType, targetId, targetKey:target.key, targetTitle:target.title }];
  await db.collection('items').doc(S.panelItem.id).update({ links:newLinks, updatedAt: FV.serverTimestamp() });
  S.panelItem.links = newLinks;
  closeModal('modal-link');
  renderPanel();
  toast('連結已新增', 'success');
}

async function removeLink(itemId, targetId) {
  const item = S.items.find(i=>i.id===itemId) || S.panelItem;
  if (!item) return;
  const newLinks = (item.links||[]).filter(l=>l.targetId!==targetId);
  await db.collection('items').doc(itemId).update({ links:newLinks, updatedAt: FV.serverTimestamp() });
  if (S.panelItem?.id===itemId) { S.panelItem.links=newLinks; renderPanel(); }
  toast('連結已移除', 'success');
}

async function saveProject() {
  const name  = document.getElementById('proj-name').value.trim();
  const key   = document.getElementById('proj-key').value.trim().toUpperCase();
  const desc  = document.getElementById('proj-desc').value.trim();
  const color = document.getElementById('proj-color').value;
  const editId = document.getElementById('proj-edit-id').value;
  if (!name||!key) { toast('請填寫名稱與代號', 'error'); return; }
  if (!/^[A-Z0-9]{1,6}$/.test(key)) { toast('代號限 1-6 個英數字元', 'error'); return; }

  if (editId) {
    // 編輯模式
    await db.collection('projects').doc(editId).update({ name, description:desc, color });
    closeModal('modal-project');
    toast('專案已更新', 'success');
    if (S.currentProject?.id === editId) renderProjectTopbar();
  } else {
    // 新增模式
    const ref = await db.collection('projects').add({
      name, key, description:desc, color,
      members: [S.user.uid],
      createdBy: S.user.uid,
      counter: 0,
      createdAt: FV.serverTimestamp()
    });
    closeModal('modal-project');
    toast(`專案 ${key} 已建立`, 'success');
    showView('project', ref.id);
  }
}

async function deleteProject(projectId) {
  const p = S.projects.find(pr=>pr.id===projectId);
  if (!p) return;
  if (!confirm(`確定要刪除專案「${p.name}」？\n此操作無法復原，專案內所有任務也會一併刪除。`)) return;

  // 刪除所有 items
  const itemsSnap = await db.collection('items').where('projectId','==',projectId).get();
  const batch = [];
  itemsSnap.docs.forEach(d => batch.push(db.collection('items').doc(d.id).delete()));
  await Promise.all(batch);

  await db.collection('projects').doc(projectId).delete();
  toast('專案已刪除', 'success');
  if (S.currentProject?.id === projectId) showView('projects');
}

async function archiveProject(projectId) {
  const p = S.projects.find(pr=>pr.id===projectId);
  if (!p) return;
  if (!confirm(`確定要封存專案「${p.name}」？\n封存後任務將從成員負載和我的工作中隱藏，可隨時解封存。`)) return;
  await db.collection('projects').doc(projectId).update({ archived: true });
  toast('專案已封存', 'success');
  if (S.currentProject?.id === projectId) showView('projects');
}

async function unarchiveProject(projectId) {
  const p = S.projects.find(pr=>pr.id===projectId);
  if (!p) return;
  await db.collection('projects').doc(projectId).update({ archived: false });
  toast('已解除封存', 'success');
}

async function inviteMember() {
  const email = document.getElementById('invite-email').value.trim().toLowerCase();
  const role  = document.getElementById('invite-role').value;
  if (!email) { toast('請填寫 Email', 'error'); return; }

  // find user by email
  const snap = await db.collection('users').where('email','==',email).limit(1).get();
  if (snap.empty) { toast('找不到此 Email 的帳號，請確認對方已完成註冊', 'error'); return; }

  const targetUid = snap.docs[0].id;
  if (!S.currentProject) { toast('請先選擇專案', 'error'); return; }

  const members = S.currentProject.members || [];
  if (members.includes(targetUid)) { toast('此成員已在專案中', 'error'); return; }

  await db.collection('projects').doc(S.currentProject.id).update({
    members: FV.arrayUnion(targetUid)
  });

  // update role in global users if admin
  if (role === 'admin') {
    await db.collection('users').doc(targetUid).update({ role: 'admin' });
  }

  closeModal('modal-invite');
  toast(`已邀請 ${email}`, 'success');
}

            <div style="display:flex;gap:6px;flex-wrap:wrap">

              ${u.id!==S.user.uid?`
              <button class="btn btn-secondary btn-sm" onclick="toggleRole('${u.id}','${u.role||'member'}')">${u.role==='admin'?'降為成員':'升為管理員'}</button>

async function toggleRole(uid, currentRole) {
  const newRole = currentRole==='admin'?'member':'admin';
  await db.collection('users').doc(uid).update({ role: newRole });
  S.users[uid] && (S.users[uid].role = newRole);
  toast('角色已更新', 'success');
  renderAdmin();
}

function openEditMember(uid, name, role) {
  document.getElementById('edit-member-uid').value = uid;
  document.getElementById('edit-member-name').value = name;
  document.getElementById('edit-member-role').value = role;
  document.getElementById('edit-member-newpw').value = '';
  openModal('modal-edit-member');
}

async function saveEditMember() {
  const uid   = document.getElementById('edit-member-uid').value;
  const name  = document.getElementById('edit-member-name').value.trim();
  const role  = document.getElementById('edit-member-role').value;
  const newpw = document.getElementById('edit-member-newpw').value;
  if (!name) { toast('請填寫姓名', 'error'); return; }
  if (newpw && newpw.length < 6) { toast('新密碼至少需要 6 位', 'error'); return; }
  await db.collection('users').doc(uid).update({ name, role });
  if (S.users[uid]) { S.users[uid].name = name; S.users[uid].role = role; }
  if (uid === S.user.uid) { S.profile.name = name; S.profile.role = role; renderSidebar(); }
  // 若有填寫新密碼且為自己，直接更新；若為他人，使用次要 App 實例
  if (newpw) {
    try {
      if (uid === S.user.uid) {
        await auth.currentUser.updatePassword(newpw);
      } else {
        const userDoc = await db.collection('users').doc(uid).get();
        const email = userDoc.data()?.email;
        if (email) {
          const tmpApp = firebase.initializeApp(firebaseConfig, 'pwreset_' + Date.now());
          const tmpAuth = tmpApp.auth();
          try {
            await tmpAuth.sendPasswordResetEmail(email);
            toast('密碼重置信已寄出（請請成員確認信箱）', 'success');
          } finally {
            await tmpApp.delete().catch(()=>{});
          }
        }
      }
    } catch(e) {
      toast('密碼更新失敗：' + (e.code||e.message), 'error');
    }
  }
  closeModal('modal-edit-member');
  toast('成員資料已更新', 'success');
  renderAdmin();
}

async function sendMemberPasswordReset() {
  const uid = document.getElementById('edit-member-uid').value;
  const userDoc = await db.collection('users').doc(uid).get();
  const email = userDoc.data()?.email;
  if (!email) { toast('找不到此成員的 Email', 'error'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    toast(`密碼重置信已寄至 ${email}`, 'success');
  } catch(e) {

async function deleteMember(uid, name) {
  if (!confirm(`確定要移除成員「${name}」？\n此操作將把該成員從所有專案中移除。`)) return;
  // 從所有專案移除
  const projSnap = await db.collection('projects').get();
  await Promise.all(projSnap.docs.map(d => {
    const members = d.data().members || [];
    if (members.includes(uid)) {
      return db.collection('projects').doc(d.id).update({
        members: members.filter(m => m !== uid)
      });
    }
  }));
  // 刪除 user doc
  await db.collection('users').doc(uid).delete();
  delete S.users[uid];
  toast(`成員 ${name} 已移除`, 'success');
  renderAdmin();
}

async function adminCreateMember() {
  const name  = document.getElementById('new-member-name').value.trim();
  const email = document.getElementById('new-member-email').value.trim().toLowerCase();
  const pass  = document.getElementById('new-member-pass').value;
  const role  = document.getElementById('new-member-role').value;
  if (!name||!email||!pass) { toast('請填寫所有欄位','error'); return; }
  if (pass.length < 6) { toast('密碼至少 6 位','error'); return; }

  try {
    const tmpApp = firebase.initializeApp(firebaseConfig, 'tmp_' + Date.now());
    const tmpAuth = tmpApp.auth();
    try {
      const cred = await tmpAuth.createUserWithEmailAndPassword(email, pass);
      await db.collection('users').doc(cred.user.uid).set({
        name, email, role, createdAt: FV.serverTimestamp()
      });
      cacheNameEmail(name, email);
    } finally {
      await tmpAuth.signOut().catch(()=>{});
      await tmpApp.delete().catch(()=>{});
    }
    closeModal('modal-invite-admin');
    toast(`帳號已建立：${name}`, 'success');
    renderAdmin();
  } catch(e) {
    toast(translateAuthError(e.code), 'error');
  }
}

const AVATAR_COLORS = [
  '#e53935','#8e24aa','#3949ab','#039be5','#00897b',
  '#43a047','#f4511e','#6d4c41','#00acc1','#7cb342',

}
function handleImportXlsx(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  if (!S.currentProject) { toast('請先選擇一個專案', 'error'); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
      // Use first sheet (skip "參數說明" reference sheet)
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      const statusMap = {'待處理':'todo','進行中':'in_progress','測試中':'testing','完成':'done'};
      const priorityMap = {'最高':'highest','高':'high','中':'medium','低':'low','最低':'lowest'};
      const typeMap = {'任務':'task','錯誤':'bug','功能':'feature','問題':'issue'};
      const nameToUid = {};
      Object.values(S.users).forEach(u=>{ if(u.name) nameToUid[u.name]=u.uid; });
      let updated=0, skipped=0;
      for (const row of rows) {
        const key = String(row['代號']||'').trim();
        if (!key) { skipped++; continue; }
        const item = S.items.find(i=>i.key===key);
        if (!item) { skipped++; continue; }

        // Build updates only for fields that actually changed
        const updates = {};

        const newTitle = row['標題'] ? String(row['標題']).trim() : null;
        if (newTitle && newTitle !== (item.title||'').trim()) updates.title = newTitle;

        if (row['說明'] !== undefined) {
          const newDesc = String(row['說明']||'');
          if (newDesc !== (item.description||'')) updates.description = newDesc;
        }

        const newStatus = row['狀態'] && statusMap[row['狀態']] ? statusMap[row['狀態']] : null;
        if (newStatus && newStatus !== item.status) updates.status = newStatus;

        const newPriority = row['優先度'] && priorityMap[row['優先度']] ? priorityMap[row['優先度']] : null;
        if (newPriority && newPriority !== item.priority) updates.priority = newPriority;

        const newType = row['類型'] && typeMap[row['類型']] ? typeMap[row['類型']] : null;
        if (newType && newType !== item.type) updates.type = newType;

        const pct = parseInt(row['進度(%)']);
        if (!isNaN(pct)) {
          const newPct = Math.min(100, Math.max(0, pct));
          if (newPct !== (item.progress||0)) updates.progress = newPct;
        }

        const due = row['截止日期'];
        if (due) {
          let newDue;
          if (due instanceof Date) newDue = due.toISOString().split('T')[0];
          else if (String(due).match(/^\d{4}-\d{2}-\d{2}/)) newDue = String(due).substring(0,10);
          if (newDue && newDue !== (item.dueDate||'')) updates.dueDate = newDue;
        }

        if (row['指派給'] && nameToUid[String(row['指派給'])]) {
          const newAssignee = nameToUid[String(row['指派給'])];
          if (newAssignee !== item.assignee) updates.assignee = newAssignee;
        }

        const raw2 = row['協作成員'] ? String(row['協作成員']).trim() : '';
        const newAssignee2 = (raw2 && raw2 !== '無') ? (nameToUid[raw2] || null) : '';
        if (newAssignee2 !== null && newAssignee2 !== (item.assignee2||'')) {
          updates.assignee2 = newAssignee2;
        }

        // Skip if nothing changed
        if (Object.keys(updates).length === 0) { skipped++; continue; }

        // Auto-sync: done↔100%
        if (updates.status === 'done' && updates.progress === undefined) updates.progress = 100;
        if (updates.progress === 100 && updates.status === undefined) updates.status = 'done';

        // Always stamp updatedAt with server time (upload time) when content changed
        updates.updatedAt = FV.serverTimestamp();

        await db.collection('items').doc(item.id).update(updates);
        updated++;
      }
      toast(`匯入完成：更新 ${updated} 筆，跳過 ${skipped} 筆（含無變更）`, 'success');
    } catch(err) {
      console.error(err);
      toast('匯入失敗，請確認檔案格式', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function exportProjectXlsx() {
  if (!S.currentProject) { toast('請先選擇一個專案', 'error'); return; }
  if (!S.items.length) { toast('此專案沒有任務可匯出', 'error'); return; }
  const statusMap = { todo:'待處理', in_progress:'進行中', testing:'測試中', done:'完成' };
  const priorityMap = { highest:'最高', high:'高', medium:'中', low:'低', lowest:'最低' };
  const typeMap = { task:'任務', bug:'錯誤', feature:'功能', issue:'問題' };
  const rows = S.items.map(i => ({
    '代號': i.key||'',
    '類型': typeMap[i.type]||i.type||'',
    '標題': i.title||'',

  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const n = rows.length;

  // Columns: A代號 B類型 C標題 D說明 E狀態 F優先度 G進度 H指派給 I協作成員 J截止日期 K建立時間 L更新時間
  ws['!cols'] = [
    {wch:12},{wch:8},{wch:30},{wch:40},{wch:10},{wch:8},
    {wch:8},{wch:12},{wch:12},{wch:12},{wch:14},{wch:14}
  ];

  const assigneeNames = Object.values(S.users).map(u=>u.name||'').filter(Boolean).join(',');

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, S.currentProject.name.substring(0,31));

  // ── "參數說明" reference sheet ──
  const memberNames = Object.values(S.users).map(u=>u.name||'').filter(Boolean).join(' / ') || '成員名稱';
  const infoData = [
    ['欄位','有效選項 / 說明'],
    ['代號','⚠ 請勿修改（用於比對任務）'],
    ['類型','任務 / 錯誤 / 功能 / 問題'],
    ['標題','任意文字'],
    ['說明','任意文字'],
    ['狀態','待處理 / 進行中 / 測試中 / 完成'],
    ['優先度','最高 / 高 / 中 / 低 / 最低'],
    ['進度(%)','0 到 100 的整數'],
    ['指派給', memberNames],
    ['協作成員', '（選填）' + memberNames],
    ['截止日期','YYYY-MM-DD 格式'],
    ['建立時間','⚠ 請勿修改'],
    ['更新時間','匯入時自動更新，無需填寫'],
  ];
  const wsInfo = XLSX.utils.aoa_to_sheet(infoData);
  wsInfo['!cols'] = [{wch:12},{wch:50}];
  XLSX.utils.book_append_sheet(wb, wsInfo, '參數說明');

  const fileName = `${S.currentProject.key}_${S.currentProject.name}.xlsx`;
  const xmlEsc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const safeNames = Object.values(S.users).map(u=>u.name||'').filter(Boolean)
    .map(n => n.replace(/,/g,'').trim()).filter(Boolean).join(',');

  // ── Build minimal OOXML dataValidations (ASCII-only attributes to avoid encoding edge cases) ──
  const dvItems = [
    `<dataValidation type="list" sqref="B2:B${n+1}"><formula1>&quot;任務,錯誤,功能,問題&quot;</formula1></dataValidation>`,
    `<dataValidation type="list" sqref="E2:E${n+1}"><formula1>&quot;待處理,進行中,測試中,完成&quot;</formula1></dataValidation>`,
    `<dataValidation type="list" sqref="F2:F${n+1}"><formula1>&quot;最高,高,中,低,最低&quot;</formula1></dataValidation>`,
    `<dataValidation type="whole" operator="between" sqref="G2:G${n+1}"><formula1>0</formula1><formula2>100</formula2></dataValidation>`,
  ];
  if (safeNames) {
    dvItems.push(`<dataValidation type="list" sqref="H2:H${n+1}"><formula1>&quot;${xmlEsc(safeNames)}&quot;</formula1></dataValidation>`);
    dvItems.push(`<dataValidation type="list" sqref="I2:I${n+1}"><formula1>&quot;,${xmlEsc(safeNames)}&quot;</formula1></dataValidation>`);
  }
  const dvXml = `<dataValidations count="${dvItems.length}">${dvItems.join('')}</dataValidations>`;

  try {
    if (typeof JSZip === 'undefined') throw new Error('JSZip not loaded');
    const wbBytes = XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const zip = await JSZip.loadAsync(wbBytes);
    const sheetEntry = zip.file('xl/worksheets/sheet1.xml');
    if (!sheetEntry) throw new Error('sheet1.xml not found');
    const rawBytes = await sheetEntry.async('uint8array');
    let xml = new TextDecoder('utf-8').decode(rawBytes);
    // Insert dataValidations right after </sheetData> — correct OOXML schema position
    if (xml.includes('</sheetData>')) {
      xml = xml.replace('</sheetData>', '</sheetData>' + dvXml);
    }
    zip.file('xl/worksheets/sheet1.xml', new TextEncoder().encode(xml));
    const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE', compressionOptions:{ level:6 } });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    console.warn('JSZip injection skipped:', e.message);
    XLSX.writeFile(wb, fileName);
  }
  toast('匯出成功', 'success');
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('zh-TW',{month:'short',day:'numeric'});
}
function formatTs(ts) {
  if (!ts) return '';
  const d = ts.seconds ? new Date(ts.seconds*1000) : new Date(ts);
  return d.toLocaleDateString('zh-TW',{year:'numeric',month:'short',day:'numeric'});
}
function dueDateColor(d) {
  if (!d) return 'inherit';
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(d+'T00:00:00');
  if (due < today) return '#de350b';
  if ((due-today)/(86400000) <= 3) return '#ff8b00';
  return 'inherit';
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-item toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function showUserMenu() {
  if (S.profile?.role === 'admin') {
    showView('admin');
  } else {
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    openModal('modal-change-pw');
  }
}

async function changeOwnPassword() {
  const current = document.getElementById('pw-current').value;
  const newPw   = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  if (!current || !newPw) { toast('請填寫所有欄位', 'error'); return; }
  if (newPw.length < 6)   { toast('新密碼至少需要 6 位', 'error'); return; }
  if (newPw !== confirm)  { toast('兩次輸入的密碼不一致', 'error'); return; }
  try {
    const cred = firebase.auth.EmailAuthProvider.credential(S.user.email, current);
    await auth.currentUser.reauthenticateWithCredential(cred);
    await auth.currentUser.updatePassword(newPw);
    closeModal('modal-change-pw');
    toast('密碼已成功修改', 'success');
  } catch(e) {
    const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      ? '目前密碼錯誤' : ('修改失敗：' + (e.code || e.message));
    toast(msg, 'error');
  }
}

// enter key on auth forms
document.getElementById('login-password').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
document.getElementById('reg-password').addEventListener('keydown', e=>{ if(e.key==='Enter') register(); });
